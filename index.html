ning applied to GWAS, matching statistical-genetics-of-complex-traits methods interest", "abstract": "The advent of high-throughput sequencing technologies has generated increasingly large and complex genomic datasets, necessitating analytical approaches capable of capturing high-dimensional and potentially nonlinear genetic interactions. This situation has significantly impacted the entire field of Genome-Wide Association Study (GWAS), whose primary goal is the identification of genomic traits and variants that are statistically associated with the risk of a disease. However, traditional GWAS methods may show reduced performance when applied to highly polygenic and nonlinear genetic architect…", "resource": "", "tier": "FYI", "matched": [{"kw": "gwas", "src": "core:statistical genetics"}, {"kw": "genome-wide association", "src": "core:statistical genetics"}, {"kw": "polygenic", "src": "core:statistical genetics"}], "suggest": ["polygenic architecture", "epistasis"], "authors": "D'Antona S, Abdalla Abakar ME, Ramazzotti D, Antoniotti M, Graudenzi A.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1038/s41431-026-02197-5", "doi": "10.1038/s41431-026-02197-5", "title": "Unraveling missing variants through target capture-based long-read sequencing in autosomal recessive disorders.", "venue": "European journal of human genetics : EJHG", "date": "2026-07-20", "url": "https://doi.org/10.1038/s41431-026-02197-5", "score": 6, "project": "Long-read sequencing & structural variation", "why": "Target-capture long-read assay recovering missing deep-intronic and structural variants in human genomes, matching the long-read + structural-variation interest", "abstract": "Short-read sequencing (SRS)-based disease-targeted NGS gene panels have revolutionized rare disease diagnostics but often leave autosomal recessive cases unsolved when only one pathogenic allele is detected. Missing variants may reside in deep intronic regions or involve structural variants (SVs) undetectab ientific reports", "date": "2026-07-20", "url": "https://doi.org/10.1038/s41598-026-61988-4", "score": 6, "project": "Shared genetic architecture & pleiotropy", "why": "Genomic structural equation modeling of shared genetic architecture / multi-trait GWAS is a HIGH-interest shared-architecture & pleiotropy method (GenomicSEM used in ASD_LR)", "abstract": "Chronic respiratory diseases cause substantial global morbidity and mortality, yet the shared genetic architecture of pulmonary-function traits, exposure-related phenotypes, and cardiometabolic traits remains incompletely characterised. We applied genomic structural equation modelling to GWAS summary statistics for four pulmonary-function traits, lifetime smoking index, ambient PM2.5 exposure, and arterial oxygen tension to model their shared genetic covariance (mvLung). The mvLung GWAS identified 2,156 loci, including 376 not significant in the individual input GWASs. EFEMP1 was prioritised a…", "resource": "", "tier": "FYI", "matched": [{"kw": "gwas", "src": "core:statistical genetics"}], "suggest": ["genomic SEM", "multi-trait GWAS", "shared genetic architecture", "EFEMP1"], "authors": "Chen G, Chen Y, Chu C, Zhu X.", "year": "2026", "hi": false, "nm": false}, {"id": "10.64898/2026.07.15.738769", "doi": "10.64898/2026.07.15.738769", "title": "PanvaR: An R package for fine-mapping and visualizing results from genome-wide association studies", "venue": "bioRxiv", "date": "2026-07-20", "url": "https://doi.org/10.64898/2026.07.15.738769", "score": 5, "project": "statistical genetics (fine-mapping)", "why": "Released fine-mapping R package for GWAS regions — fine-mapping method interest (resource floor, crop context)", "abstract": "Genome-wide association studies (GWAS) use statistical models to correlate single nucleotide polymorphisms (SNPs) to a phenotype of interest. This scan of the entire genome identifies regions of association with a phenotype, but due to linkage disequilibrium (LD), GWAS on their own cannot function drawConstellation(){
  const svg=document.getElementById('acct-constel'); if(!svg)return;
  const kws=[]; TASTE.bank.filter(g=>g.core).forEach(g=>g.kws.forEach(k=>kws.push({k:k,f:bankFreq(k)})));
  const top=kws.sort((a,b)=>b.f-a.f).slice(0,16);
  if(!top.length){ svg.innerHTML='<text x="260" y="98" text-anchor="middle" font-size="11" fill="#888">no keywords yet</text>'; return; }
  let fmax=1; top.forEach(x=>{ if(x.f>fmax)fmax=x.f; });
  const W=520,H=190; top.forEach((x,i)=>{ x.cx=40+((i*103)%(W-80)); x.cy=28+((i*61)%(H-56)); x.r=5+Math.round(x.f/fmax*11); });
  let s='';
  top.forEach((x,i)=>{ if(i>0){ const p=top[i-1]; s+=`<line x1="${p.cx}" y1="${p.cy}" x2="${x.cx}" y2="${x.cy}" stroke="var(--line)" stroke-width="1"/>`; } });
  top.forEach(x=>{ const op=(0.4+0.6*(x.f/fmax)).toFixed(2), fill=Math.round(40+x.f/fmax*55);
    s+=`<circle cx="${x.cx}" cy="${x.cy}" r="${x.r}" fill="color-mix(in srgb,var(--brand) ${fill}%,var(--surface))" stroke="var(--brand)" stroke-opacity="${op}" data-kw="${esc(x.k)}"><title>${esc(x.k)} — ${x.f} paper${x.f===1?'':'s'}</title></circle>`;
    if(x.r>=9) s+=`<text x="${x.cx}" y="${x.cy+3}" text-anchor="middle" font-size="7" fill="#fff" pointer-events="none">${esc(x.k.slice(0,7))}</text>`; });
  svg.innerHTML=s;
  svg.querySelectorAll('circle[data-kw]').forEach(c=>c.addEventListener('click',()=>{ closeSettings(); filterKw(c.dataset.kw); }));
}

  const _dir = VIEW.sortDir==='asc'?-1:1;
  function scmp(a,b){ if(VIEW.sort==='score') return _dir*((b.p.score==null?-1:b.p.score)-(a.p.score==null?-1:a.p.score));
    if(VIEW.sort==='date'){ const c=(a.p.date||'')>(b.p.date||'')?-1:((a.p.date||'')<(b.p.date||'')?1:0); return c!==0?_dir*c:a.i-b.i; }
    if(VIEW.sort==='title') return _dir*(a.p.title||'').localeCompare(b.p.title||'');
    return a.i-b.i; }
  if(!keys.length){ zone.innerHTML='<div class="emptystate"><div class="es-ic">☕</div><div class="es-msg">'+(VIEW.kw?('nothing tagged “'+esc(VIEW.kw)+'”'):'nothing matches this filter')+'</div><button class="es-btn" onclick="resetView()">show all papers</button></div>'; wireScrollspy(); updProgress(); return; }
  // flat ordered list (group order × within-sort) → paginate → re-group the slice
  const flat=[]; keys.forEach(k=>{ groups.get(k).slice().sort(scmp).forEach(o=>flat.push([k,o])); });
  const size = PAGE_SIZE==='all' ? flat.length : (+PAGE_SIZE||20);
  const pages = Math.max(1, Math.ceil(flat.length/Math.max(1,size)));
  if(VIEW.page>=pages) VIEW.page=pages-1; if(VIEW.page<0) VIEW.page=0;
  const slice = flat.slice(VIEW.page*size, VIEW.page*size+size);
  const shown=new Map(); slice.forEach(x=>{ if(!shown.has(x[0])) shown.set(x[0],[]); shown.get(x[0]).push(x[1]); });
  [...shown.keys()].forEach(k=>{
    const arr=shown.get(k);
    const slug = VIEW.group==='tier' ? (TIER_SLUG[k]||'fyi') : 'watch';
    const secid='sec-'+slugify(k);
    const sec=document.createElement('section'); sec.id=secid; if(VIEW.group==='date') sec.className='tl-group';
    const tic = VIEW.group==='tier'?(TIER_ICON[k]||'i-archive'):(VIEW.group==='date'?'i-archive':'i-sliders');
    sec.innerHTML=`<div class="masthead" style="--c:var(--${slug})"><span class="glyph">${ico(tic)}</span><h2>${esc(k)}</h2><span class="mrule"></span></div>`;
    arr.forEach(o=>sec.appendChild(o.el));
    zone.appendChild(sec);
    const a=document.createElement('a'); a.href='#'+secid; a.className='navlink'; a.style.setProperty('--c','var(--'+slug+')'); a.dataset.g=k;
    a.innerHTML=`<span class="ndot"></span> ${esc(k)} <span class="nn">${groups.get(k).length}</span> <span class="prog"></span>`;
    nav.appendChild(a);
  });
  const _ni=document.createElement('span'); _ni.className='navind'; nav.insertBefore(_ni, nav.firstChild);   // #19 sliding marker
  requestAnimationFrame(moveNavInd);
  renderPager(pages);
  repaintShown(); wireScrollspy(); updProgress(); refreshDials();
}

// #5 command palette
const PAL={items:[], k:0};
// search over ALL papers (title · journal · abstract) — commands/views/sections removed; this is a pure paper search
function palData(){
  return CARDS.map(o=>{ const p=o.p, title=p.title||'(untitled)', ven=p.venue||'', abs=p.abstract||p.why||'';
    return {t:title, k:'paper', sub:ven, go:()=>jumpCard(o),
      _title:title.toLowerCase(), _ven:ven.toLowerCase(), _abs:abs.toLowerCase(), _hay:(title+' '+ven+' '+abs).toLowerCase()}; });
}
// fuzzy search helpers: subsequence (typo tolerance) + multi-token paper scoring across title/journal/abstract
function _subseq(hay,q){ let i=0,j=0; while(i<hay.length&&j<q.length){ if(hay[i]===q[j])j++; i++; } return j===q.length; }
function _paperScore(o,tokens){ let s=0;
  for(const tk of tokens){ const inT=o._title.indexOf(tk), inV=o._ven.indexOf(tk), inA=o._abs.indexOf(tk);
    if(inT<0&&inV<0&&inA<0){ if(_subseq(o._title,tk)){ s+=1; continue; } return -1; }   // every token must appear somewhere (fuzzy on title as fallback)
    s += (inT>=0?6:0) + (inV>=0?3:0) + (inA>=0?1:0) + (inT===0?4:0); }
  return s; }
function jumpCard(o){ if(!o)return; VIEW.filter='all'; VIEW.kw=null; syncSeg('segFilter','all');
  const p=document.getElementById('kwpill'); if(p)p.classList.remove('on'); layout();
  const el=document.getElementById(o.el.id); if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); focusCardEl(el); } }
function ensurePal(){ let pal=document.getElementById('pal'); if(pal)return pal;
  pal=document.createElement('div'); pal.id='pal'; pal.className='pal';
  pal.innerHTML='<div class="palbox"><input id="palq" placeholder="Search papers — title · journal · abstract (fuzzy) — or a tier / action…" autocomplete="off" spellcheck="false"><div class="palist" id="palist"></div></div>';
  document.body.appendChild(pal);
  pal.addEventListener('click',e=>{ if(e.target===pal) closePal(); });
  const q=pal.querySelector('#palq');
  q.addEventListener('input',()=>{ PAL.k=0; palRender(q.value); });
  q.addEventListener('keydown',palKey);
  return pal; }
function openPal(){ const pal=ensurePal(); pal.classList.add('show'); const q=document.getElementById('palq'); q.value=''; palRender(''); q.focus(); }
function closePal(){ const pal=document.getElementById('pal'); if(pal)pal.classList.remove('show'); }
// wrap the matched query tokens in <span class="ph"> (red) for the palette results
function palMark(text,ql){ text=text||''; if(!ql) return esc(text);
  const low=text.toLowerCase(), tokens=ql.split(/\s+/).filter(Boolean); let ranges=[];
  tokens.forEach(tk=>{ let i=0; while((i=low.indexOf(tk,i))>=0){ ranges.push([i,i+tk.length]); i+=tk.length; } });
  if(!ranges.length) return esc(text);
  ranges.sort((a,b)=>a[0]-b[0]); let merged=[ranges[0]];
  for(let k=1;k<ranges.length;k++){ const last=merged[merged.length-1]; if(ranges[k][0]<=last[1]) last[1]=Math.max(last[1],ranges[k][1]); else merged.push(ranges[k]); }
  let out='',prev=0; merged.forEach(r=>{ out+=esc(text.slice(prev,r[0]))+'<span class="ph">'+esc(text.slice(r[0],r[1]))+'</span>'; prev=r[1]; }); return out+esc(text.slice(prev)); }
function palRender(qv){
  const all=palData(), ql=(qv||'').toLowerCase().trim();
  let list;
  if(!ql){ list=all; }
  else { const tokens=ql.split(/\s+/).filter(Boolean), scored=[];
    all.forEach(o=>{ let s;
      if(o.k==='paper'){ s=_paperScore(o,tokens); }
      else { const lt=o.t.toLowerCase(); s = tokens.every(tk=>lt.indexOf(tk)>=0) ? 50 : (_subseq(lt,ql)?12:-1); }
      if(s>=0) scored.push({o:o,s:s}); });
    scored.sort((a,b)=>b.s-a.s); list=scored.map(x=>x.o); }
  PAL.items=list.slice(0,40);
  const box=document.getElementById('palist'); if(!box)return;
  box.innerHTML=PAL.items.length? PAL.items.map((o,i)=>`<div class="palopt${i===PAL.k?' k-on':''}" data-i="${i}"><span class="pt">${palMark(o.t,ql)}</span><span class="k">${palMark(o.sub||o.k,ql)}</span></div>`).join('')
    : '<div class="palopt"><span class="pt">no matches</span></div>';
  [...box.querySelectorAll('.palopt[data-i]')].forEach(el=>el.addEventListener('click',()=>palGo(+el.dataset.i)));
}
function palHi(){ const box=document.getElementById('palist'); if(!box)return;
  [...box.children].forEach((el,i)=>el.classList.toggle('k-on', i===PAL.k));
  const cur=box.children[PAL.k]; if(cur&&cur.scrollIntoView) cur.scrollIntoView({block:'nearest'}); }
function palKey(e){
  if(e.key==='ArrowDown'){e.preventDefault(); PAL.k=Math.min(PAL.k+1,PAL.items.length-1); palHi();}
  else if(e.key==='ArrowUp'){e.preventDefault(); PAL.k=Math.max(PAL.k-1,0); palHi();}
  else if(e.key==='Enter'){e.preventDefault(); palGo(PAL.k);}
  else if(e.key==='Escape'){ closePal(); } }
function palGo(i){ const o=PAL.items[i]; if(!o)return; closePal(); if(o.go)o.go(); }

// #1 keyboard navigation + rating
function visCards(){ return [...document.querySelectorAll('#cardzone .card')]; }
function focusCardEl(el){ document.querySelectorAll('#cardzone .card.kbfocus').forEach(c=>{ if(c!==el)c.classList.remove('kbfocus'); }); if(el)el.classList.add('kbfocus'); }
function kbMove(d){ const vc=visCards(); if(!vc.length)return;
  let cur=vc.findIndex(c=>c.classList.contains('kbfocus'));
  let ni = cur<0 ? (d>0?0:vc.length-1) : Math.min(Math.max(cur+d,0),vc.length-1);

function kbNextUnrated(){ const vc=visCards(); if(!vc.length)return;

  for(let j=1;j<=vc.length;j++){ const el=vc[(Math.max(start,0)+j)%vc.length]; if(!isRated(PAPERS[+el.dataset.i])){ focusCardEl(el); el.scrollIntoView({behavior:'smooth',block:'center'}); return; } }

function kbRate(v){ const el=document.querySelector('#cardzone .card.kbfocus'); if(!el)return;
  const i=+el.dataset.i; if(PAPERS[i].nm)return;

document.addEventListener('keydown',function(e){
  const _deck=document.getElementById('deck');
  if(_deck&&_deck.classList.contains('on')){                                   // D1 deck keys
    const ae0=document.activeElement, tg0=ae0?ae0.tagName:'';
    if(e.key==='Escape'){ closeDeck(); return; }
    if(tg0==='INPUT'||tg0==='TEXTAREA') return;
    if(e.key==='ArrowLeft'){ e.preventDefault(); deckVote(5); }        // ← Interested
    else if(e.key==='ArrowDown'){ e.preventDefault(); deckVote(3); }   // ↓ Maybe
    else if(e.key==='ArrowRight'){ e.preventDefault(); deckVote(2); }  // → Not for me (=2)
    else if(e.key==='ArrowUp'||e.key==='k'){ e.preventDefault(); deckPrev(); }   // move back
    else if(e.key==='j'){ e.preventDefault(); deckNext(); }                       // skip forward
    else if(e.key==='s'){ e.preventDefault(); deckSave(); }
    else if(e.key>='1'&&e.key<='5'){ e.preventDefault(); const k=+e.key, v = k>=4?5:(k>=2?3:2); deckVote(v); }   // 4-5→Interested · 2-3→Maybe · 1→Not(2)
    return;
  }
  const _set=document.getElementById('setmodal');
  if(_set&&_set.classList.contains('on')){ if(e.key==='Escape') closeSettings(); return; }
  const _sv=document.getElementById('savedmodal');
  if(_sv&&_sv.classList.contains('on')){ if(e.key==='Escape') closeSaved(); return; }
  const _gr=document.getElementById('graphov');
  if(_gr&&_gr.classList.contains('on')){ if(e.key==='Escape') closeGraph(); return; }
  if(e.metaKey||e.ctrlKey){ if(e.key.toLowerCase()==='k'){ e.preventDefault(); const pal=document.getElementById('pal'); (pal&&pal.classList.contains('show'))?closePal():openPal(); } return; }
  const ae=document.activeElement, tag=ae?ae.tagName:'';
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||(ae&&ae.isContentEditable)) return;
  const pal=document.getElementById('pal'); if(pal&&pal.classList.contains('show')) return;
  if(e.key==='/'){ e.preventDefault(); openPal(); }
  else if(e.key==='j'){ e.preventDefault(); kbMove(1); }
  else if(e.key==='k'){ e.preventDefault(); kbMove(-1); }
  else if(e.key==='n'){ e.preventDefault(); kbNextUnrated(); }
  else if(e.key==='f'){ e.preventDefault(); toggleFocusMode(); }
  else if(e.key>='1'&&e.key<='5'){ kbRate(+e.key); }
  else if(e.key==='?'){ toast('keys — j/k: move · 1-5: interest · n: next unrated · f: focus mode · / or ⌘K: palette'); }
});

// #17 relevance dial counts up when it scrolls into view (_dialIO declared up top)
function refreshDials(){
  if(!('IntersectionObserver' in window)) return;
  if(_dialIO) _dialIO.disconnect();
  _dialIO=new IntersectionObserver(function(es){ es.forEach(function(en){ if(en.isIntersecting){ animDial(en.target); _dialIO.unobserve(en.target); } }); },{threshold:.5});
  document.querySelectorAll('#cardzone .meter.g').forEach(m=>{ if(m.dataset.done!=='1') _dialIO.observe(m); });
}
function animDial(m){ const to=+m.dataset.score; if(isNaN(to))return; m.dataset.done='1';
  const b=m.querySelector('b');
  if(matchMedia('(prefers-reduced-motion:reduce)').matches){ m.style.setProperty('--v',to); if(b)b.textContent=to; return; }
  let v=0; m.style.setProperty('--v',0); if(b)b.textContent='0';
  const iv=setInterval(function(){ v++; m.style.setProperty('--v',v); if(b)b.textContent=v; if(v>=to)clearInterval(iv); },55); }

// #8 scrollspy — re-wired after every layout (_spyIO declared up top, before first layout)
function wireScrollspy(){
  if(_spyIO) _spyIO.disconnect();
  const links=[...document.querySelectorAll('nav .navlink')]; if(!links.length)return;
  const map=Object.fromEntries(links.map(a=>[a.getAttribute('href').slice(1),a]));
  _spyIO=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){
    links.forEach(l=>l.classList.remove('active')); const a=map[e.target.id]; if(a){a.classList.add('active'); moveNavInd();} } }); },
    {rootMargin:'-45% 0px -50% 0px',threshold:0});
  document.querySelectorAll('#cardzone section').forEach(s=>_spyIO.observe(s));
}
// #19 nav sliding marker
function moveNavInd(){ if(!nav)return; const a=nav.querySelector('.navlink.active')||nav.querySelector('.navlink'), ni=nav.querySelector('.navind');
  if(a&&ni){ni.style.top=a.offsetTop+'px'; ni.style.left=a.offsetLeft+'px'; ni.style.width=a.offsetWidth+'px'; ni.style.height=a.offsetHeight+'px'; ni.style.opacity=1;} }
// #22 sort-direction labels
function updateSortLabels(){ const s=document.getElementById('segSort'); if(!s)return; const base={default:'Default',score:'Score',date:'Date',title:'Title'};
  [...s.querySelectorAll('button')].forEach(b=>{ const v=b.dataset.v; b.textContent=base[v]+((v===VIEW.sort&&v!=='default')?(VIEW.sortDir==='desc'?' ▼':' ▲'):''); }); }
// D3 sparkline
function sparkSVG(vals){ const w=90,h=30,max=Math.max.apply(null,vals)||1,n=vals.length;
  const pts=vals.map((v,i)=>`${(n===1?0:i/(n-1)*w).toFixed(1)},${(h-2-v/max*(h-4)).toFixed(1)}`).join(' ');
  return `<svg class="wm-spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`; }
// sync a list card's pips/verdict/rated from R (deck + restore)
function syncCard(o){ if(!o)return; const i=o.i, r=R[o.p.id], card=document.getElementById('c'+i); if(!card)return;
  if(!o.p.nm){ ['interest','match'].forEach(dim=>{ const grp=card.querySelector('.pips[data-d="'+dim+'"]'); if(grp)[...grp.children].forEach(b=>{const bv=+b.dataset.v; b.classList.toggle('fill',bv<=r[dim]); b.setAttribute('aria-checked',bv===r[dim]?'true':'false');}); }); }
  if(!o.p.nm){ const _sb=card.querySelector('.segbar'); if(_sb){ const _cur=(r.interest===r.match)?r.interest:0; _sb.querySelectorAll('.sv').forEach(b=>{const on=(+b.dataset.v===_cur); b.classList.toggle('on',on); b.setAttribute('aria-checked',on?'true':'false');}); } }
  else if(r.verdict){ card.querySelectorAll('.vbtn').forEach(b=>b.classList.toggle('on',b.dataset.v===r.verdict)); }
  const on=o.p.nm?(!!r.verdict||!!(r.note||'').trim()):(r.interest>1||r.match>1||!!(r.note||'').trim());

function hlAbs(text,kws){ let s=esc(text||''); if(!kws||!kws.length) return s;

  const low=s.toLowerCase(), marks=[];
  terms.forEach(t=>{ const tl=esc(t).toLowerCase(); if(!tl)return; let i=0; while((i=low.indexOf(tl,i))>=0){ marks.push([i,i+tl.length]); i+=tl.length; } });
  if(!marks.length) return s; marks.sort((a,b)=>a[0]-b[0]);
  const merged=[]; marks.forEach(m=>{const last=merged[merged.length-1]; if(last&&m[0]<=last[1]) last[1]=Math.max(last[1],m[1]); else merged.push([m[0],m[1]]);});
  let out='',prev=0; merged.forEach(m=>{ out+=s.slice(prev,m[0])+'<mark>'+s.slice(m[0],m[1])+'</mark>'; prev=m[1]; }); return out+s.slice(prev); }

  function openGate(){
    if(document.querySelector(".lp-gate")) return;
    var g=document.createElement("div"); g.className="lp-gate";
    g.innerHTML='<div class="gc"><h1>Enter the lab</h1><p>One-time: the shared lab passphrase, then your name. Saved on this browser.</p>'+
      '<div class="s1"><label>Lab passphrase</label><input type="password" class="pin" autocomplete="off"><div class="er e1"></div><button class="go g1">Continue</button></div>'+
      '<div class="s2 lp-hide"><label>You are…</label><select class="nin"></select><button class="go g2">Enter</button></div></div>';
    document.body.appendChild(g);
    var pin=g.querySelector(".pin"), e1=g.querySelector(".e1");
    g.querySelector(".g1").onclick=function(){ var p=pin.value.trim(); if(!p) return; e1.textContent="";
      rpc("get_roster",{p_pass:p}).then(function(roster){ PASS=p; localStorage.setItem("lp_pass",p);
        var sel=g.querySelector(".nin"); sel.innerHTML=(roster||[]).map(function(m){ return '<option value="'+esc(m.initials)+'">'+esc(m.display)+' ('+esc(m.initials)+')</option>'; }).join('');
        if(ME) sel.value=ME;
        g.querySelector(".s1").classList.add("lp-hide"); g.querySelector(".s2").classList.remove("lp-hide");
      }).catch(function(e){ e1.textContent=(e&&e.message==="bad_passphrase")?"Wrong passphrase.":"Could not verify — try again."; }); };
    pin.addEventListener("keydown",function(e){ if(e.key==="Enter") g.querySelector(".g1").click(); });
    g.querySelector(".g2").onclick=function(){ ME=g.querySelector(".nin").value; if(!ME) return; localStorage.setItem("lp_me",ME); g.remove(); setWho(); refresh(); };
    pin.focus();
  }

  // boot
  injectVotes(); setWho();
  loadCounts().then(applyCounts);
  if(PASS&&ME){ loadDetail().then(applyCounts); } else { openGate(); }
})();
</script>

</body></html>
