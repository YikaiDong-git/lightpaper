 of polygenic risk scores and subphenotypes in social anxiety disorder.", "venue": "Translational Psychiatry", "date": "2026-07-11", "url": "https://doi.org/10.1038/s41398-026-04155-7", "score": 6, "project": "ASD long-read", "why": "Cross-disorder PRS (SCZ/BD/MDD GWAS) for social anxiety — PGS + psychiatric shared architecture.", "abstract": "Social anxiety disorder (SAD) is a common anxiety disorder (ANX) with moderate heritability that often co-occurs with other mental disorders. Until now, sample sizes in genetic analyses of SAD have been limited, so that the genetic basis of SAD and its subphenotypes is still largely unknown. In a large cohort comprising n = 1,194 SAD patients derived from five German cohorts and n = 3,409 controls from the Heinz Nixdorf Recall Study, we computed polygenic risk scores (PRS) at six p-thresholds using PRSice-2 based on large-scale genome-wide association studies for depression, major depressive disorder (MDD), ANX, schizophrenia (SCZ), bipolar disorder (BD), attention-deficit/hyperactivity disorder (ADHD), anorexia nervosa (AN), autism spectrum disorder (ASD), and alcohol dependence (AD). We used general linear models to examine the association between the PRS and SAD status. In SAD subsamples, we investigated whether the PRS are associated with SAD subphenotypes (i.e., SAD severity, current depressive symptoms, comorbid MDD) using correlation analyses and a general linear model. Results were corrected for multiple testing. The SAD status was significantly associated with PRS for depression, MDD, ANX, SCZ, BD, AN, and ASD (pBH-adjustedBH-adjusted>0.05). Our results support that SAD seems to be ge…", "resource": "", "tier": "FYI", "matched": [{"kw": "genome-wide association", "src": "core:statistical genetics"}, {"kw": "heritability", "src": "core:statistical genetics"}, {"kw": "polygenic", "src": "core:statistical genetics"}, {"kw": "prs", "src": "core:statistical genetics"}, {"kw": "autism", "src": "core:disease genetics"}, {"kw": "asd", "src": "core:disease genetics"}, {"kw": "autism spectrum disorder", "src": "pool:From digest (user-added)"}], "suggest": ["polygenic risk scores", "PRSice-2", "social anxiety disorder", "bipolar disorder"], "authors": "Sindermann L, Röhrig A, David FS, Schmidt B, Domschke K, Nieratschker V, Dannlowski U, Leehr EJ, Leibing E, Nöthen MM, Geiser F, Schumacher J, Maj C, Conrad R, Forstner AJ.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1126/scitranslmed.adx4852", "doi": "10.1126/scitranslmed.adx4852", "title": "Alzheimer’s disease proteome-wide association study implicates adaptive immunity and identifies risk genes LILRB1 and SIRPA", "venue": "Science Translational Medicine", "date": "2026-07-01", "url": "https://doi.org/10.1126/scitranslmed.adx4852", "score": 6, "project": "PWAS", "why": "PWAS integrating multi-ancestry plasma cis-pQTL models (identifies LILRB1/SIRPA) — strong PWAS method fit.", "abstract": "The rapid expansion of plasma proteomic data and protein quantitative trait loci (pQTLs) provides an opportunity to identify genes that confer disease risk through their effect on plasma protein abundance. We conducted an Alzheimer's disease (AD) proteome-wide association study (PWAS) integrating publicly available plasma cis-pQTL data (1348 European American and 1385 African American genetically determined protein models) with AD dementia GWAS summary statistics. Whereas the African American PWAS identified one candidate [apolipoprotein E (APOE)] and multiple suggestive genes, the European American PWAS identified 18 genes with putative causal relationships with AD through cis regulation of plasma protein abundance. Thirteen of these candidate genes were additionally supported by colocalization and complementary causal-inference analyses such as summary data-based Mendelian randomization. Four of these proteins were not previously detected in AD GWAS [complement decay-accelerating factor (CD55), leukocyte immunoglobulin-like receptor B1 (LILRB1), scavenger receptor class A member 5 (SCARA5), and signal regulatory protein alpha (SIRPA)]. A subset of candidate gene-associated proteins was associated with 8- and 20-year dementia risk, markers of AD pathology, and a CSF proteomic signature enriched for immune and metabolic processes. Putative causal proteins were enriched for adap", "resource": "", "tier": "FYI", "matched": [{"kw": "gwas", "src": "core:statistical genetics"}, {"kw": "colocalization", "src": "core:statistical genetics"}, {"kw": "coloc", "src": "core:statistical genetics"}, {"kw": "mendelian randomization", "src": "core:statistical genetics"}, {"kw": "proteome-wide association", "src": "core:statistical genetics"}, {"kw": "pwas", "src": "core:statistical genetics"}], "suggest": ["cis-pQTL", "multi-ancestry", "LILRB1", "adaptive immunity"], "authors": "", "year": "2026", "hi": false, "nm": false}, {"id": "10.1186/s12859-026-06555-4", "doi": "10.1186/s12859-026-06555-4", "title": "PG2: algorithms and a web-based tool for effective layout and visual analysis of pangenome graphs.", "venue": "BMC Bioinformatics", "date": "2026-07-16", "url": "https://doi.org/10.1186/s12859-026-06555-4", "score": 6, "project": "Centromere", "why": "PG2: released pangenome-graph layout/visualization tool relevant to HPRC/T2T complex-region work.", "abstract": "The advent of cost-effective whole-genome assembly has enabled the creation of comprehensive pangenomes with resolved haplotypes across various organisms. This technological leap drives the refinement of tailored methodologies to manage the intricate sequences and variations in extensive collections of related genomes. These methodologies often utilize graphical representations of pangenomes to enhance algorithms for tasks like sequence alignment, visualization, and functional genomics. Leveraging the insights provided by pangenomes, these approaches exhibit improved efficiency in bioinformatics tasks such as read mapping, variant calling, and genotyping. Pangenome graphs are positioned to become invaluable assets in genomics, offering seamless reconciliation of diverse sequence and coordinate systems. While their potential to replace linear reference genomes is uncertain, their adaptability ensures their utility in future pangenomic models. Utilizing graphs for visual representation aids in exploring critical insights and identifying key patterns, facilitating analysis by highlighting connections, trends, and patterns for improved comprehension. Towards this goal, we present some algorithms to effectively layout and visually analyze pangenome graphs. Then, we introduce an open-source, flexible, easy-to-use, web-based platform named PG2 (PanGenoGrapher), realizing these algorit", "resource": "PG2 pangenome-graph viewer", "tier": "FYI", "matched": [{"kw": "pangenome", "src": "core:centromere/T2T"}, {"kw": "aging", "src": "core:aging/cell-death"}, {"kw": "pangenome graph", "src": "pool:Pangenome graph genotyping"}], "suggest": ["graph layout", "read mapping", "variant calling", "visualization"], "authors": "Solun GK, Dogrusoz U, Bingöl Z, Alkan C.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1016/j.atherosclerosis.2026.121849", "doi": "10.1016/j.atherosclerosis.2026.121849", "title": "Genome-wide cross-trait analysis reveals immunogenetic pleiotropy between autoimmune diseases and myocardial infarction and prioritizes therapeutic targets.", "venue": "Atherosclerosis", "date": "2026-07-15", "url": "https://doi.org/10.1016/j.atherosclerosis.2026.121849", "score": 6, "project": "statistical genetics", "why": "Genome-wide cross-trait pleiotropy (autoimmune incl. T1D-adjacent vs MI) via LDSC/S-LDSC/coloc/SMR.", "abstract": "Autoimmune diseases (ADs) are associated with increased myocardial infarction (MI) risk, suggesting shared genetic susceptibility. We systematically investigated the shared genetic architecture, pleiotropic loci, and candidate therapeutic targets linking ADs and MI. We analyzed genome-wide association study summary statistics for 10 ADs and MI, primarily from European-ancestry populations. Linkage disequilibrium score regression, high-definition likelihood, stratified linkage disequilibrium score regression, pleiotropy analysis, Bayesian colocalization, and immune-trait colocalization were performed. Candidate genes were prioritized using summary-data-based Mendelian randomization and followed up using quantitative polymerase chain reaction in hypoxia-treated HL-1 cardiomyocytes and by descriptive expression profiling in single-cell RNA sequencing datasets from human atherosclerotic plaques and cardiac resident immune cells. MI showed significant positive genetic correlations with Crohn's disease, rheumatoid arthritis (RA), and primary biliary cholangitis (PBC) after false discovery rate correction. We identified 49 pleiotropic loci, including 7 with colocalization evidence compatible with a shared causal variant. Integrative analyses prioritized 12 candidate genes, with SH2B3, TMEM116, and ACAD10 highlighted across multiple disease pairs. Immune-trait colocalization highlighte", "resource": "", "tier": "FYI", "matched": [{"kw": "genome-wide association", "src": "core:statistical genetics"}, {"kw": "genetic correlation", "src": "core:statistical genetics"}, {"kw": "colocalization", "src": "core:statistical genetics"}, {"kw": "coloc", "src": "core:statistical genetics"}, {"kw": "mendelian randomization", "src": "core:statistical genetics"}, {"kw": "single-cell", "src": "core:single-cell/spatial"}], "suggest": ["stratified LDSC", "cross-trait colocalization", "SMR"], "authors": "Liao CC, Hu WC, Yang SF, Li JM.", "year": "2026", "hi": false, "nm": false}, {"id": "10.3390/biology15131061", "doi": "10.3390/biology15131061", "title": "Spatial Transcriptomics in Breast Cancer: Advances and Applications.", "venue": "Biology", "date": "2026-07-03", "url": "https://doi.org/10.3390/biology15131061", "score": 6, "project": "Single-cell/spatial / Breast-cancer genetics", "why": "Spatial-transcriptomics review in breast cancer (focus disease).", "abstract": "Background/objectivesWhile traditional transcriptomics and single-cell RNA sequencing can reveal differences in cell type and gene expression, they cannot provide spatial information within tissues. Spatial transcriptomics (ST), as an emerging technology in recent years, has achieved significant progress in resolving gene expression along the spatial dimension. This technology quantifies gene expression at defined spatial coordinates and describes the spatial distribution of transcripts and the co-localization patterns between cells within intact tissue, allowing for an integrated analysis of molecular and spatial information. This review aims to systematically trace the development of ST and highlight its application value in breast cancer research.MethodsWe systematically reviewed the recent literature on ST platforms, on combined analyses of single-cell RNA sequencing (scRNA-seq) and ST, and on integrated spatial multi-omics in breast cancer. Key topics include tumor microenvironment organization, intra-tumor heterogeneity, the spatial distribution of immune cells, cancer-associated fibroblast function, treatment-response prediction, and personalized-treatment strategy development.ResultsST can characterize the spatial organization of interactions between breast cancer cells and the tumor microenvironment, describe the spatial dimensions of tumor heterogeneity, and provide m", "resource": "", "tier": "FYI", "matched": [{"kw": "single-cell", "src": "core:single-cell/spatial"}, {"kw": "scrna", "src": "core:single-cell/spatial"}, {"kw": "spatial transcriptomic", "src": "core:single-cell/spatial"}, {"kw": "breast cancer", "src": "core:disease genetics"}], "suggest": ["spatial transcriptomics", "single-cell RNA-seq", "tumor microenvironment"], "authors": "Cao Y, Xu K, Li X, Zhang J, Jin W, Liu Y.", "year": "2026", "hi": false, "nm": false}, {"id": "10.64898/2026.07.10.26357777", "doi": "10.64898/2026.07.10.26357777", "title": "Multi-omic Profiling of Recurrence Risk Across Breast Cancer Subtypes", "venue": "medRxiv", "date": "2026-07-14", "url": "https://doi.org/10.64898/2026.07.10.26357777", "score": 6, "project": "Breast-cancer genetics", "why": "Multi-omic recurrence profiling in breast cancer across intrinsic subtypes.", "abstract": "Recurrence risk greatly varies across intrinsic subtypes in breast cancer, yet the molecular and immune programs within primary tumors that go on to develop recurrence remains poorly understood. We performed multi-omic analysis of 340 breast cancer tumors across Basal-like, Luminal A, and Luminal B subtypes to identify tumor-intrinsic and microenvironmental features associated with recurrence. Within each intrinsic subtype, we compared recurrent and non-recurrent tumors across RNA, copy-number, and pathway-level mutational features. Basal-like tumors in patients who developed recurrence were characterized by reduced lymphocytes and pro-inflammatory M1 macrophages, enrichment of TGF-{beta}/EMT activity, copy number gains within 5p/7p/7q, 4q losses, and increased pathway tumor mutational burden (pTMB) in growth-factor, inflammatory, and motility-associated signaling pathways, each of which was associated with increased recurrence risk. In Luminal A tumors, recurrent cases showed higher lymphocytes and pro-inflammatory M1 macrophages, enrichment of metabolic, stress-response, and stemness/plasticity associated pathways, and higher pTMB in growth-factor, inflammatory, motility-associated, DNA repair and apoptosis signaling pathways all associated with recurrence risk. Among Luminal B tumors, recurrent cases were enriched for proliferation, genomic instability, DNA repair, and stres", "resource": "", "tier": "FYI", "matched": [{"kw": "copy number", "src": "core:structural variation"}, {"kw": "breast cancer", "src": "core:disease genetics"}], "suggest": ["multi-omics", "recurrence risk", "intrinsic subtypes", "tumor microenvironment"], "authors": "Cruikshank, A. E.; Chandra, P.; Li, C. I.; Ha, G.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1021/acs.jcim.6c01401", "doi": "10.1021/acs.jcim.6c01401", "title": "SpaVCCA Identifies Spatial Transcriptomics Domains Across Slices by Coupling Variational Autoencoder with Canonical Correlation Analysis.", "venue": "Journal of Chemical Information and Modeling", "date": "2026-07-16", "url": "https://doi.org/10.1021/acs.jcim.6c01401", "score": 6, "project": "Single-cell/spatial", "why": "SpaVCCA (VAE+CCA) cross-slice spatial-transcriptomics domain integration (released tool).", "abstract": "Spatial transcriptomics enables the characterization of gene expression within intact tissue architecture, but identifying domains across batches, platforms, or conditions remains challenging due to technical variability and batch effects. Existing methods often fail to simultaneously achieve effective batch correction and preservation of spatial structure. Here, we propose SpaVCCA, a unified framework for spatial transcriptomics integration that combines a graph convolutional Variational Autoencoder (VAE) with a Canonical Correlation Analysis (CCA)-based alignment loss and a graph contrastive objective. The graph convolutional encoder captures local spatial dependencies, while the CCA loss aligns latent representations across batches. The contrastive loss further preserves local neighborhood structure during integration. We evaluate SpaVCCA on diverse data sets, including different platforms (Visium, Stereoseq, MERFISH) with multiple slices, cross-technology integration, and 3D spatial data. Compared to existing state-of-the-art (SOTA) methods, SpaVCCA delivers substantial performance advancements. Overall, SpaVCCA provides a scalable and effective solution for integrating spatial transcriptomics data, characterizing spatially organized cellular states and supporting applications in drug development and disease research.", "resource": "SpaVCCA spatial-transcriptomics tool", "tier": "FYI", "matched": [{"kw": "spatial transcriptomic", "src": "core:single-cell/spatial"}], "suggest": ["spatial transcriptomics", "variational autoencoder", "batch integration", "canonical correlation analysis", "domain detection"], "authors": "Guo ZH, Wang YB, Zhao BW, Pan J, You ZH.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1038/s42003-026-10414-6", "doi": "10.1038/s42003-026-10414-6", "title": "Fragmentation-Induced Coverage Biases in Cell-Free DNA Sequencing Affect the Clinical Sensitivity of Liquid Biopsies.", "venue": "Communications Biology", "date": "2026-07-13", "url": "https://doi.org/10.1038/s42003-026-10414-6", "score": 6, "project": "", "why": "Wildcard: cfDNA fragmentation coverage/allele biases across 67k samples affecting variant detection — sequencing-methodology insight adjacent to your variant-calling work.", "abstract": "Cell-free DNA (cfDNA) circulating in blood is characterized by epigenetic context-dependent fragmentation that distinguishes it from the stable genomic DNA of solid tissues. Extensive fragmentation and degradation of cfDNA can result in uneven coverage and potential loss of genetic information. Yet, its implications for the sensitivity of non-invasive detection of clinically relevant variants remain unclear. We analyzed clinical genomic data comprising 0.4 million variants across 67,129 samples from 99 cohorts spanning all major cancer types. We demonstrate that locus-specific and allele-specific coverage biases in liquid biopsy, driven by cfDNA fragmentation, affect known oncogenic hotspots in clinically actionable genes, including TP53, EGFR, and NRAS. These biases result in uneven sensitivity for detecting somatic variants. Longitudinal analysis reveals that these biases can compromise the reliability of disease tracking, potentially leading to false-negative conclusions about clonal extinction and minimal residual disease. We also urge caution while assessing clonal hematopoiesis from cfDNA sequencing.", "resource": "", "tier": "Wildcard", "matched": [{"kw": "clonal hematopoiesis", "src": "core:clonal hematopoiesis"}], "suggest": ["cfDNA", "liquid biopsy", "fragmentation bias", "coverage bias", "variant detection"], "authors": "Vijayan Selvarajan A, Kabiraj D, De S.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1038/s41375-026-03050-w", "doi": "10.1038/s41375-026-03050-w", "title": "Heteroplasmic variants of mitochondrial genome in tumor and normal samples from patients with hematologic malignancies", "venue": "Leukemia", "date": "2026-07-16", "url": "https://doi.org/10.1038/s41375-026-03050-w", "score": 6, "project": "NUMT (adjacent)", "why": "Wildcard: human mtDNA heteroplasmy in hematologic malignancy tumor/normal samples — mtDNA/mitochondrial genome-feature angle (P2-adjacent).", "abstract": "Mitochondria are maternally inherited organelles involved in energy metabolism, proliferation, apoptosis, and immune regulation [ 1 ]. Due to its high copy number and mutation rate, mitochondrial DNA (mtDNA) frequently exhibits heteroplasmy, a state in which wild-type and mutant mtDNA molecules coexist within the same cell [ 2 ]. While heteroplasmic mtDNA mutations have been extensively characterized across human solid cancers, their relevance in hematologic malignancies remains poorly investigated [ 3 ]. Oxidative stress is increasingly recognized as a contributor to cancer pathogenesis, and the mitochondrial genome is particularly vulnerable to reactive oxygen species (ROS)-induced DNA damage. In fact, alterations of the mitochondrial genome may be cause and consequence of tumor development, and may cooperate with potent oncogenes such as MYC , regulating metabolic fitness and chemoresistance [ 4 ]. This could be particularly relevant in diffuse large B-cell lymphoma (DLBCL), acute myeloid leukemia (AML) and chronic lymphocytic leukemia (CLL), in which a pathogenic role of oxidative stress has been described [ 5 , 6 , 7 ]. Here, we explored the mitochondrial mutational landscape of DLBCL, AML, and CLL and identified recurrent heteroplasmic mtDNA variants that extended beyond tumor cells and were also detected in normal tissues. We analyzed publicly available whole genome (WGS", "resource": "", "tier": "Wildcard", "matched": [{"kw": "exome", "src": "core:statistical genetics"}, {"kw": "copy number", "src": "core:structural variation"}, {"kw": "mitochondrial dna", "src": "core:long-read/under-explored"}, {"kw": "mtdna", "src": "core:long-read/under-explored"}], "suggest": ["mtDNA heteroplasmy", "mitochondrial genome", "hematologic malignancy", "somatic mutation", "oxidative stress"], "authors": "", "year": "2026", "hi": false, "nm": false}, {"id": "http://arxiv.org/abs/2607.09535v1", "doi": "", "title": "Global testing of SNP-methylation interactions on binary phenotypes via a logistic functional regression model", "venue": "arXiv", "date": "2026-07-10", "url": "http://arxiv.org/abs/2607.09535v1", "score": 6, "project": "statistical genetics", "why": "Wildcard: statistical method for global SNP-by-methylation interaction testing (logistic functional regression) — disease-agnostic transferable stat-gen method.", "abstract": "Understanding how genetic and epigenetic factors jointly influence binary health outcomes remains a major challenge in biomedical research. We propose a global test for the overall effect of interactions between DNA methylation and a set of single nucleotide polymorphisms (SNPs) on a binary phenotype. We propose a logistic functional regression model in which methylation measurements at CpG sites are transformed into smooth functional predictors interacting with discrete SNP genotypes through a localized kernel. This framework enables stable inference on region-level interactions while accounting for the spatial structure of methylation around SNPs. Extensive simulations show that the proposed test provides well-calibrated type I error and improved power over classical SNP-CpG pairwise analyses. The practical relevance of the method is illustrated using publicly available methylation and genotyping data from an obesity case-control study.", "resource": "", "tier": "Wildcard", "matched": [{"kw": "methylation", "src": "core:long-read/under-explored"}], "suggest": ["SNP-methylation interaction", "functional regression", "epigenetics", "region-based test", "statistical genetics"], "authors": "Yvelin Gansou, Karim Oualkacha, Marzia Angela Cremona, Lajmi Lakhal-Chaieb", "year": "2026", "hi": false, "nm": false}];

function drawWeightsBar(){
  const box=document.getElementById('weightbars'); if(!box)return;
  const w=(TASTE.weights&&TASTE.weights.topics)||{}; const ks=Object.keys(w);
  if(!ks.length){ box.innerHTML='<div style="font-size:11px;color:var(--faint)">No learned weights yet.</div>'; return; }
  let maxdev=0.01; ks.forEach(k=>{ const dv=Math.abs(w[k]-1); if(dv>maxdev)maxdev=dv; });
  box.innerHTML=ks.sort((a,b)=>w[b]-w[a]).map(k=>{ const v=w[k], dev=v-1, half=(Math.abs(dev)/maxdev)*50;
    const st = dev>=0 ? `left:50%;width:${half.toFixed(1)}%;background:var(--brand)` : `left:${(50-half).toFixed(1)}%;width:${half.toFixed(1)}%;background:var(--must)`;
    return `<div class="wbar"><span class="wn" title="${esc(k)}">${esc(k)}</span><div class="wt"><span class="bs"></span><i style="${st}"></i></div><span class="wv">×${v}</span></div>`;
  }).join('');
}

function drawConstellation(){
  const svg=document.getElementById('acct-constel'); if(!svg)return;
  const kws=[]; TASTE.bank.filter(g=>g.core).forEach(g=>g.kws.forEach(k=>kws.push({k:k,f:bankFreq(k)})));
  const top=kws.sort((a,b)=>b.f-a.f).slice(0,16);
  if(!top.length){ svg.innerHTML='<text x="260" y="98" text-anchor="middle" font-size="11" fill="#888">no keywords yet</text>'; return; }
  let fmax=1; top.forEach(x=>{ if(x.f>fmax)fmax=x.f; });
  const W=520,H=190; top.forEach((x,i)=>{ x.cx=40+((i*103)%(W-80)); x.cy=28+((i*61)%(H-56)); x.r=5+Math.round(x.f/fmax*11); });
  let s='';
  top.forEach((x,i)=>{ if(i>0){ const p=top[i-1]; s+=`<line x1="${p.cx}" y1="${p.cy}" x2="${x.cx}" y2="${x.cy}" stroke="var(--line)" stroke-width="1"/>`; } });
  top.forEach(x=>{ const op=(0.4+0.6*(x.f/fmax)).toFixed(2), fill=Math.round(40+x.f/fmax*55);
    s+=`<circle cx="${x.cx}" cy="${x.cy}" r="${x.r}" fill="color-mix(in srgb,var(--brand) ${fill}%,var(--surface))" stroke="var(--brand)" stroke-opacity="${op}" data-kw="${esc(x.k)}"><title>${esc(x.k)} — ${x.f} paper${x.f===1?'':'s'}</title></circle>`;
    if(x.r>=9) s+=`<text x="${x.cx}" y="${x.cy+3}" text-anchor="middle" font-size="7" fill="#fff" pointer-events="none">${esc(x.k.slice(0,7))}</text>`; });
  svg.innerHTML=s;
  svg.querySelectorAll('circle[data-kw]').forEach(c=>c.addEventListener('click',()=>{ closeSettings(); filterKw(c.dataset.kw); }));
}

function layout(){
  zone.innerHTML=''; nav.innerHTML=''; zone.classList.toggle('timeline', VIEW.group==='date');
  let vis=CARDS.filter(o=>{
    if(VIEW.filter==='unrated' && isRated(o.p)) return false;
    if(VIEW.filter==='rated' && !isRated(o.p)) return false;
    if(VIEW.datef && VIEW.datef!=='all'){ const _d=o.p.date;
      if(!_d) return false;
      const _ag=Math.round((Date.parse(_refDate)-Date.parse(_d))/86400000);
      if(VIEW.datef==='today' && _ag>0) return false;
      if(VIEW.datef==='7d' && _ag>7) return false;
      if(VIEW.datef==='30d' && _ag>30) return false; }
    if(VIEW.kw){ const hay=('|'+(o.el.dataset.kws||'')+'|').toLowerCase(); if(hay.indexOf('|'+VIEW.kw.toLowerCase()+'|')<0) return false; }
    if(VIEW.search){ const p=o.p, hay=((p.title||'')+' '+(p.venue||'')+' '+(p.abstract||p.why||'')).toLowerCase();
      if(VIEW.search.split(/\s+/).filter(Boolean).some(tk=>hay.indexOf(tk)<0)) return false; }   // header search bar: every token must appear in title/journal/abstract
    return true;
  });
  const groups=new Map();
  vis.forEach(o=>{ const k=groupKey(o); if(!groups.has(k)) groups.set(k,[]); groups.get(k).push(o); });
  let keys=[...groups.keys()];
  if(VIEW.group==='tier') keys.sort((a,b)=>TIER_ORDER.indexOf(a)-TIER_ORDER.indexOf(b));
  else if(VIEW.group==='date') keys.sort((a,b)=> a>b?-1:a<b?1:0);
  else keys.sort((a,b)=> groups.get(b).length-groups.get(a).length);
  const _dir = VIEW.sortDir==='asc'?-1:1;
  function scmp(a,b){ if(VIEW.sort==='score') return _dir*((b.p.score==null?-1:b.p.score)-(a.p.score==null?-1:a.p.score));
    if(VIEW.sort==='date'){ const c=(a.p.date||'')>(b.p.date||'')?-1:((a.p.date||'')<(b.p.date||'')?1:0); return c!==0?_dir*c:a.i-b.i; }
    if(VIEW.sort==='title') return _dir*(a.p.title||'').localeCompare(b.p.title||'');
    return a.i-b.i; }
  if(!keys.length){ zone.innerHTML='<div class="emptystate"><div class="es-ic">☕</div><div class="es-msg">'+(VIEW.kw?('nothing tagged “'+esc(VIEW.kw)+'”'):'nothing matches this filter')+'</div><button class="es-btn" onclick="resetView()">show all papers</button></div>'; wireScrollspy(); updProgress(); return; }
  // flat ordered list (group order × within-sort) → paginate → re-group the slice
  const flat=[]; keys.forEach(k=>{ groups.get(k).slice().sort(scmp).forEach(o=>flat.push([k,o])); });
  const size = PAGE_SIZE==='all' ? flat.length : (+PAGE_SIZE||20);
  const pages = Math.max(1, Math.ceil(flat.length/Math.max(1,size)));
  if(VIEW.page>=pages) VIEW.page=pages-1; if(VIEW.page<0) VIEW.page=0;
  const slice = flat.slice(VIEW.page*size, VIEW.page*size+size);
  const shown=new Map(); slice.forEach(x=>{ if(!shown.has(x[0])) shown.set(x[0],[]); shown.get(x[0]).push(x[1]); });
  [...shown.keys()].forEach(k=>{
    const arr=shown.get(k);
    const slug = VIEW.group==='tier' ? (TIER_SLUG[k]||'fyi') : 'watch';
    const secid='sec-'+slugify(k);
    const sec=document.createElement('section'); sec.id=secid; if(VIEW.group==='date') sec.className='tl-group';
    const tic = VIEW.group==='tier'?(TIER_ICON[k]||'i-archive'):(VIEW.group==='date'?'i-archive':'i-sliders');
    sec.innerHTML=`<div class="masthead" style="--c:var(--${slug})"><span class="glyph">${ico(tic)}</span><h2>${esc(k)}</h2><span class="mrule"></span></div>`;
    arr.forEach(o=>sec.appendChild(o.el));
    zone.appendChild(sec);
    const a=document.createElement('a'); a.href='#'+secid; a.className='navlink'; a.style.setProperty('--c','var(--'+slug+')'); a.dataset.g=k;
    a.innerHTML=`<span class="ndot"></span> ${esc(k)} <span class="nn">${groups.get(k).length}</span> <span class="prog"></span>`;
    nav.appendChild(a);
  });
  const _ni=document.createElement('span'); _ni.className='navind'; nav.insertBefore(_ni, nav.firstChild);   // #19 sliding marker
  requestAnimationFrame(moveNavInd);
  renderPager(pages);
  repaintShown(); wireScrollspy(); updProgress(); refreshDials();
}

function updProgress(){
  const total=PAPERS.length, done=PAPERS.filter(isRated).length;

// #5 command palette
const PAL={items:[], k:0};
// search over ALL papers (title · journal · abstract) — commands/views/sections removed; this is a pure paper search
function palData(){
  return CARDS.map(o=>{ const p=o.p, title=p.title||'(untitled)', ven=p.venue||'', abs=p.abstract||p.why||'';
    return {t:title, k:'paper', sub:ven, go:()=>jumpCard(o),
      _title:title.toLowerCase(), _ven:ven.toLowerCase(), _abs:abs.toLowerCase(), _hay:(title+' '+ven+' '+abs).toLowerCase()}; });
}
// fuzzy search helpers: subsequence (typo tolerance) + multi-token paper scoring across title/journal/abstract
function _subseq(hay,q){ let i=0,j=0; while(i<hay.length&&j<q.length){ if(hay[i]===q[j])j++; i++; } return j===q.length; }
function _paperScore(o,tokens){ let s=0;
  for(const tk of tokens){ const inT=o._title.indexOf(tk), inV=o._ven.indexOf(tk), inA=o._abs.indexOf(tk);
    if(inT<0&&inV<0&&inA<0){ if(_subseq(o._title,tk)){ s+=1; continue; } return -1; }   // every token must appear somewhere (fuzzy on title as fallback)
    s += (inT>=0?6:0) + (inV>=0?3:0) + (inA>=0?1:0) + (inT===0?4:0); }
  return s; }
function jumpCard(o){ if(!o)return; VIEW.filter='all'; VIEW.kw=null; syncSeg('segFilter','all');
  const p=document.getElementById('kwpill'); if(p)p.classList.remove('on'); layout();
  const el=document.getElementById(o.el.id); if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); focusCardEl(el); } }
function ensurePal(){ let pal=document.getElementById('pal'); if(pal)return pal;
  pal=document.createElement('div'); pal.id='pal'; pal.className='pal';
  pal.innerHTML='<div class="palbox"><input id="palq" placeholder="Search papers — title · journal · abstract (fuzzy) — or a tier / action…" autocomplete="off" spellcheck="false"><div class="palist" id="palist"></div></div>';
  document.body.appendChild(pal);
  pal.addEventListener('click',e=>{ if(e.target===pal) closePal(); });
  const q=pal.querySelector('#palq');
  q.addEventListener('input',()=>{ PAL.k=0; palRender(q.value); });
  q.addEventListener('keydown',palKey);
  return pal; }
function openPal(){ const pal=ensurePal(); pal.classList.add('show'); const q=document.getElementById('palq'); q.value=''; palRender(''); q.focus(); }
function closePal(){ const pal=document.getElementById('pal'); if(pal)pal.classList.remove('show'); }
// wrap the matched query tokens in <span class="ph"> (red) for the palette results
function palMark(text,ql){ text=text||''; if(!ql) return esc(text);
  const low=text.toLowerCase(), tokens=ql.split(/\s+/).filter(Boolean); let ranges=[];
  tokens.forEach(tk=>{ let i=0; while((i=low.indexOf(tk,i))>=0){ ranges.push([i,i+tk.length]); i+=tk.length; } });
  if(!ranges.length) return esc(text);
  ranges.sort((a,b)=>a[0]-b[0]); let merged=[ranges[0]];
  for(let k=1;k<ranges.length;k++){ const last=merged[merged.length-1]; if(ranges[k][0]<=last[1]) last[1]=Math.max(last[1],ranges[k][1]); else merged.push(ranges[k]); }
  let out='',prev=0; merged.forEach(r=>{ out+=esc(text.slice(prev,r[0]))+'<span class="ph">'+esc(text.slice(r[0],r[1]))+'</span>'; prev=r[1]; }); return out+esc(text.slice(prev)); }
function palRender(qv){
  const all=palData(), ql=(qv||'').toLowerCase().trim();
  let list;
  if(!ql){ list=all; }
  else { const tokens=ql.split(/\s+/).filter(Boolean), scored=[];
    all.forEach(o=>{ let s;
      if(o.k==='paper'){ s=_paperScore(o,tokens); }
      else { const lt=o.t.toLowerCase(); s = tokens.every(tk=>lt.indexOf(tk)>=0) ? 50 : (_subseq(lt,ql)?12:-1); }
      if(s>=0) scored.push({o:o,s:s}); });
    scored.sort((a,b)=>b.s-a.s); list=scored.map(x=>x.o); }
  PAL.items=list.slice(0,40);
  const box=document.getElementById('palist'); if(!box)return;
  box.innerHTML=PAL.items.length? PAL.items.map((o,i)=>`<div class="palopt${i===PAL.k?' k-on':''}" data-i="${i}"><span class="pt">${palMark(o.t,ql)}</span><span class="k">${palMark(o.sub||o.k,ql)}</span></div>`).join('')
    : '<div class="palopt"><span class="pt">no matches</span></div>';
  [...box.querySelectorAll('.palopt[data-i]')].forEach(el=>el.addEventListener('click',()=>palGo(+el.dataset.i)));
}
function palHi(){ const box=document.getElementById('palist'); if(!box)return;
  [...box.children].forEach((el,i)=>el.classList.toggle('k-on', i===PAL.k));
  const cur=box.children[PAL.k]; if(cur&&cur.scrollIntoView) cur.scrollIntoView({block:'nearest'}); }
function palKey(e){
  if(e.key==='ArrowDown'){e.preventDefault(); PAL.k=Math.min(PAL.k+1,PAL.items.length-1); palHi();}
  else if(e.key==='ArrowUp'){e.preventDefault(); PAL.k=Math.max(PAL.k-1,0); palHi();}
  else if(e.key==='Enter'){e.preventDefault(); palGo(PAL.k);}
  else if(e.key==='Escape'){ closePal(); } }
function palGo(i){ const o=PAL.items[i]; if(!o)return; closePal(); if(o.go)o.go(); }

// #1 keyboard navigation + rating
function visCards(){ return [...document.querySelectorAll('#cardzone .card')]; }
function focusCardEl(el){ document.querySelectorAll('#cardzone .card.kbfocus').forEach(c=>{ if(c!==el)c.classList.remove('kbfocus'); }); if(el)el.classList.add('kbfocus'); }
function kbMove(d){ const vc=visCards(); if(!vc.length)return;
  let cur=vc.findIndex(c=>c.classList.contains('kbfocus'));
  let ni = cur<0 ? (d>0?0:vc.length-1) : Math.min(Math.max(cur+d,0),vc.length-1);
  focusCardEl(vc[ni]); vc[ni].scrollIntoView({behavior:'smooth',block:'center'}); }

  for(let j=1;j<=vc.length;j++){ const el=vc[(Math.max(start,0)+j)%vc.length]; if(!isRated(PAPERS[+el.dataset.i])){ focusCardEl(el); el.scrollIntoView({behavior:'smooth',block:'center'}); return; } }
  toast('All visible papers rated ✓'); }
function kbRate(v){ const el=document.querySelector('#cardzone .card.kbfocus'); if(!el)return;
  const i=+el.dataset.i; if(PAPERS[i].nm)return;
  const grp=el.querySelector('.pips[data-d="interest"]'); if(!grp)return;
  const btn=grp.querySelector('.pip[data-v="'+v+'"]'); if(btn)set(btn); }
document.addEventListener('keydown',function(e){
  const _deck=document.getElementById('deck');
  if(_deck&&_deck.classList.contains('on')){                                   // D1 deck keys
    const ae0=document.activeElement, tg0=ae0?ae0.tagName:'';
    if(e.key==='Escape'){ closeDeck(); return; }
    if(tg0==='INPUT'||tg0==='TEXTAREA') return;
    if(e.key==='ArrowLeft'){ e.preventDefault(); deckVote(5); }        // ← Interested
    else if(e.key==='ArrowDown'){ e.preventDefault(); deckVote(3); }   // ↓ Maybe
    else if(e.key==='ArrowRight'){ e.preventDefault(); deckVote(2); }  // → Not for me (=2)
    else if(e.key==='ArrowUp'||e.key==='k'){ e.preventDefault(); deckPrev(); }   // move back
    else if(e.key==='j'){ e.preventDefault(); deckNext(); }                       // skip forward
    else if(e.key==='s'){ e.preventDefault(); deckSave(); }
    else if(e.key>='1'&&e.key<='5'){ e.preventDefault(); const k=+e.key, v = k>=4?5:(k>=2?3:2); deckVote(v); }   // 4-5→Interested · 2-3→Maybe · 1→Not(2)
    return;
  }
  const _set=document.getElementById('setmodal');
  if(_set&&_set.classList.contains('on')){ if(e.key==='Escape') closeSettings(); return; }
  const _sv=document.getElementById('savedmodal');
  if(_sv&&_sv.classList.contains('on')){ if(e.key==='Escape') closeSaved(); return; }
  const _gr=document.getElementById('graphov');
  if(_gr&&_gr.classList.contains('on')){ if(e.key==='Escape') closeGraph(); return; }
  if(e.metaKey||e.ctrlKey){ if(e.key.toLowerCase()==='k'){ e.preventDefault(); const pal=document.getElementById('pal'); (pal&&pal.classList.contains('show'))?closePal():openPal(); } return; }
  const ae=document.activeElement, tag=ae?ae.tagName:'';
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||(ae&&ae.isContentEditable)) return;
  const pal=document.getElementById('pal'); if(pal&&pal.classList.contains('show')) return;
  if(e.key==='/'){ e.preventDefault(); openPal(); }
  else if(e.key==='j'){ e.preventDefault(); kbMove(1); }
  else if(e.key==='k'){ e.preventDefault(); kbMove(-1); }
  else if(e.key==='n'){ e.preventDefault(); kbNextUnrated(); }
  else if(e.key==='f'){ e.preventDefault(); toggleFocusMode(); }
  else if(e.key>='1'&&e.key<='5'){ kbRate(+e.key); }
  else if(e.key==='?'){ toast('keys — j/k: move · 1-5: interest · n: next unrated · f: focus mode · / or ⌘K: palette'); }
});

// #17 relevance dial counts up when it scrolls into view (_dialIO declared up top)
function refreshDials(){
  if(!('IntersectionObserver' in window)) return;
  if(_dialIO) _dialIO.disconnect();
  _dialIO=new IntersectionObserver(function(es){ es.forEach(function(en){ if(en.isIntersecting){ animDial(en.target); _dialIO.unobserve(en.target); } }); },{threshold:.5});
  document.querySelectorAll('#cardzone .meter.g').forEach(m=>{ if(m.dataset.done!=='1') _dialIO.observe(m); });
}
function animDial(m){ const to=+m.dataset.score; if(isNaN(to))return; m.dataset.done='1';
  const b=m.querySelector('b');
  if(matchMedia('(prefers-reduced-motion:reduce)').matches){ m.style.setProperty('--v',to); if(b)b.textContent=to; return; }
  let v=0; m.style.setProperty('--v',0); if(b)b.textContent='0';
  const iv=setInterval(function(){ v++; m.style.setProperty('--v',v); if(b)b.textContent=v; if(v>=to)clearInterval(iv); },55); }

// #8 scrollspy — re-wired after every layout (_spyIO declared up top, before first layout)
function wireScrollspy(){
  if(_spyIO) _spyIO.disconnect();
  const links=[...document.querySelectorAll('nav .navlink')]; if(!links.length)return;
  const map=Object.fromEntries(links.map(a=>[a.getAttribute('href').slice(1),a]));
  _spyIO=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){
    links.forEach(l=>l.classList.remove('active')); const a=map[e.target.id]; if(a){a.classList.add('active'); moveNavInd();} } }); },
    {rootMargin:'-45% 0px -50% 0px',threshold:0});
  document.querySelectorAll('#cardzone section').forEach(s=>_spyIO.observe(s));
}

function closeDeck(){ const d=document.getElementById('deck'); if(d)d.classList.remove('on'); layout(); }
function deckNext(){ if(deckIdx<deckList.length-1){ deckIdx++; _deckDir=1; renderDeck(); } else { closeDeck(); toast('End of deck ✓'); } }
function deckPrev(){ if(deckIdx>0){ deckIdx--; _deckDir=-1; renderDeck(); } }
function deckRow(i,dim,label){ let b=`<div class="rrow${dim==='interest'?' first':''}"><span class="lbl">${label}</span><div class="pips" data-i="${i}" data-d="${dim}" role="radiogroup" aria-label="${label}">`;
  for(let v=1;v<=5;v++) b+=`<button type="button" class="pip" data-v="${v}" onclick="deckSet(this)"></button>`;
  return b+`</div></div>`; }
function deckVerdict(i){ return `<div class="rrow"><span class="lbl">Verdict</span><span class="vseg"><button class="vbtn" data-i="${i}" data-v="missed" onclick="deckSetVerdict(this)">✓ should've</button><button class="vbtn" data-i="${i}" data-v="correct" onclick="deckSetVerdict(this)">✗ dropped</button></span></div>`; }
function renderDeck(){ const o=deckList[deckIdx]; if(!o)return; const p=o.p, i=o.i, slug=TIER_SLUG[p.tier]||'fyi';
  const card=document.getElementById('deckcard'); card.style.setProperty('--c','var(--'+slug+')');
  const t=p.url?`<a href="${p.url}" target="_blank" rel="noopener">${esc(p.title)}</a>`:esc(p.title);
  const sc=p.score==null?'':' · score '+p.score;
  card.innerHTML=`<div class="deck-tier">${esc(p.tier)}${sc}</div><h2>${t}</h2>`+
    `<div class="deck-meta">${esc(p.venue)} · ${esc(p.date)}${p.resource?(' · 🔧 '+esc(p.resource)):''}</div>`+
    `<div class="deck-abs">${p.abstract?hlAbs(p.abstract,p.matched):esc(p.why||'(no abstract available)')}</div>`;   // abstract is the star — highlight matched keywords like normal mode
  card.classList.remove('anim-next','anim-prev'); if(_deckDir){ void card.offsetWidth; card.classList.add(_deckDir>0?'anim-next':'anim-prev'); } _deckDir=0;   // DT1 slide (next=from right, prev=from left)
  const rateHTML=(MODE==='nearmiss'||p.nm)?deckVerdict(i):deckVoteBar(i);
  const saved=SAVED.has(p.id);
  document.getElementById('deckctrl').innerHTML=
    `<div class="deck-rrows">${rateHTML}</div>`+
    `<input class="note deck-note" data-i="${i}" oninput="setNote(this)" placeholder="note — context the scorer can't see" value="${esc(R[p.id].note||'')}">`+
    `<div class="deck-foot"><span class="deck-hint">← Interested · ↓ Maybe · → Not · j/k skip · s save · esc</span>`+
    `<div class="deck-nav"><button class="deck-save${saved?' on':''}" onclick="deckSave()">${saved?'★ saved':'☆ save'}</button>`+
    `<button onclick="deckPrev()">← prev</button><button onclick="deckNext()">skip →</button></div></div>`;
  syncDeckPips(o);
  document.getElementById('deckprog').textContent=(deckIdx+1)+' / '+deckList.length;
  const fg=document.getElementById('deckringfg'); if(fg){ const C=2*Math.PI*19; fg.style.strokeDasharray=C; fg.style.strokeDashoffset=C*(1-(deckList.length?(deckIdx+1)/deckList.length:0)); }
  const dc=document.getElementById('deckcard'); if(dc)dc.scrollTop=0; }
// deck rate mode = one coarse 3-way verdict (no dials): Interested=5 · Maybe=3 · Not=1 (sets BOTH interest & match to that value)
function deckVoteBar(i){ const r=R[PAPERS[i].id], cur=(r&&r.interest===r.match)?r.interest:0;
  return `<div class="deck-vote">`+
    `<button class="dv y${cur===5?' on':''}" data-v="5" onclick="deckVote(5)">★ Interested</button>`+
    `<button class="dv m${cur===3?' on':''}" data-v="3" onclick="deckVote(3)">◐ Maybe</button>`+
    `<button class="dv n${cur===2?' on':''}" data-v="2" onclick="deckVote(2)">✕ Not for me</button></div>`; }   // Not=2 (not 1): 1 is the "unrated" default, so a "1" vote would be silently dropped from the feedback
function deckVote(v){ const o=deckList[deckIdx]; if(!o||o.p.nm)return; const r=R[o.p.id]; if(!r)return;
  r.interest=v; r.match=v;
  document.querySelectorAll('#deckctrl .deck-vote .dv').forEach(b=>b.classList.toggle('on',+b.dataset.v===v));
  syncCard(o); updCount(); markDirty(); setTimeout(deckNext,220); }
function syncDeckPips(o){ const r=R[o.p.id];
  if(!o.p.nm){ const cur=(r.interest===r.match)?r.interest:0; document.querySelectorAll('#deckctrl .deck-vote .dv').forEach(b=>b.classList.toggle('on',+b.dataset.v===cur)); }
  else if(r.verdict){ document.querySelectorAll('#deckctrl .vbtn').forEach(b=>b.classList.toggle('on',b.dataset.v===r.verdict)); } }
function deckSet(el){ const grp=el.parentNode, i=+grp.dataset.i, dim=grp.dataset.d, v=+el.dataset.v;
  R[PAPERS[i].id][dim]=v;
  [...grp.children].forEach(b=>{const bv=+b.dataset.v; b.classList.toggle('fill',bv<=v);});
  el.style.transform='scale(1.3)'; setTimeout(()=>{el.style.transform='';},140);
  syncCard(deckList[deckIdx]); updCount(); markDirty();
  if(dim==='interest') setTimeout(deckNext,220); }
function deckSetVerdict(el){ const i=+el.dataset.i, v=el.dataset.v, r=R[PAPERS[i].id];
  r.verdict=(r.verdict===v?null:v);
  el.parentNode.querySelectorAll('.vbtn').forEach(b=>b.classList.toggle('on',b.dataset.v===r.verdict));
  syncCard(deckList[deckIdx]); updCount(); markDirty(); if(r.verdict) setTimeout(deckNext,220); }
function deckSave(){ const o=deckList[deckIdx]; if(!o)return; const id=o.p.id, i=o.i;
  if(SAVED.has(id))SAVED.delete(id); else SAVED.add(id);
  const b=document.querySelector('.savebtn[data-i="'+i+'"]'); if(b)b.classList.toggle('on',SAVED.has(id));
  const q=document.getElementById('qbtn'); if(q)q.textContent='🔖 saved ('+SAVED.size+')';
  refreshShelf(); markDirty();
  const sv=document.querySelector('#deckctrl .deck-save'); if(sv){ sv.classList.toggle('on',SAVED.has(id)); sv.textContent=SAVED.has(id)?'★ saved':'☆ save'; } }

function visEl(k){ if(k==='dashboard')return wmEl; if(k==='changed')return chEl; if(k==='shelf')return shEl;

// --- animated panel dismiss (option C: shrink into the ✕) ---
function reduceMotion(){ try{return !!(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches);}catch(e){return false;} }
function cancelAnim(el){ if(el&&el._dpAnim){ el._dpAnim=false; clearTimeout(el._dpTimer); if(el._dpEnd)el.removeEventListener('transitionend',el._dpEnd); el.classList.remove('dp-dismissing','dp-gone'); el.style.maxHeight=''; } }
function animateOut(el, done){
  if(!el){ done&&done(); return; }
  cancelAnim(el); el._dpAnim=true;
  el.style.maxHeight=el.scrollHeight+'px'; el.classList.add('dp-dismissing');
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ if(el._dpAnim) el.classList.add('dp-gone'); }); });
  let fired=false;
  const finish=function(){ if(fired)return; fired=true; if(el._dpEnd)el.removeEventListener('transitionend',el._dpEnd);
    const was=el._dpAnim; el._dpAnim=false; el.classList.remove('dp-dismissing','dp-gone'); el.style.maxHeight='';
    if(was) done&&done(); };
  el._dpEnd=function(ev){ if(ev.target===el && (ev.propertyName==='max-height'||ev.propertyName==='transform')) finish(); };
  el.addEventListener('transitionend',el._dpEnd); el._dpTimer=setTimeout(finish,700);
}
// user ✕ dismiss: persist state + switch immediately, run the C animation, then set display:none at the end
function dismissPanel(k){
  const el=visEl(k); VIS[k]=false; saveVis();
  const sw=document.querySelector('.vis-sw[data-k="'+k+'"]'); if(sw)sw.checked=false;
  if(k==='shelf'){ if(shEl){ shEl.classList.remove('on'); if(reduceMotion())shEl.style.display='none'; else setTimeout(function(){ if(VIS.shelf===false)shEl.style.display='none'; },340); } return; }
  if(!el){ return; }
  if(reduceMotion()){ el.style.display='none'; return; }
  animateOut(el, function(){ el.style.display='none'; });
}
function dismissSection(k){ dismissPanel(k); }

// pagination (papers per page)
function setPageSize(v){ PAGE_SIZE=v; localStorage.setItem('dp_pagesize',v); VIEW.page=0; syncSeg('setPage',v); layout(); }
function gotoPage(n){ VIEW.page=n; layout(); }   // stay at the current scroll position (don't yank back to the top on every page change)
function renderPager(pages){ const old=document.getElementById('pager'); if(old)old.remove();
  const p=document.createElement('div'); p.className='pager'; p.id='pager';
  let h=`<span class="pg-lbl">show</span><div class="pg-size seg">`;
  ['10','20','50','all'].forEach(v=>{ h+=`<button class="${PAGE_SIZE===v?'on':''}" onclick="setPageSize('${v}')">${v==='all'?'All':v}</button>`; });

  if(PAGE_SIZE!=='all' && pages>1){
    h+=`<span class="pg-nav"><button ${VIEW.page===0?'disabled':''} onclick="gotoPage(${VIEW.page-1})">‹</button>`;
    for(let i=0;i<pages;i++){ if(pages>7 && i>1 && i<pages-2 && Math.abs(i-VIEW.page)>1){ if(i===2||i===pages-3) h+=`<span class="pinfo">…</span>`; continue; }
      h+=`<button class="${i===VIEW.page?'on':''}" onclick="gotoPage(${i})">${i+1}</button>`; }
    h+=`<button ${VIEW.page>=pages-1?'disabled':''} onclick="gotoPage(${VIEW.page+1})">›</button>`;
    h+=`<span class="pg-lbl">page</span><input class="pg-jump" type="number" min="1" max="${pages}" value="${VIEW.page+1}" onchange="pagerJump(this.value,${pages})" onkeydown="if(event.key==='Enter')pagerJump(this.value,${pages})"><span class="pinfo">/ ${pages}</span></span>`;
  }
  p.innerHTML=h; zone.appendChild(p); }

// re-sync the currently-shown cards from R (so ratings survive pagination / deck-mode edits)
function repaintShown(){ document.querySelectorAll('#cardzone .card').forEach(card=>{ const i=+card.dataset.i, p=PAPERS[i]; if(!p)return; const r=R[p.id]; if(!r)return;
  if(!p.nm){ ['interest','match'].forEach(dim=>{ const grp=card.querySelector('.pips[data-d="'+dim+'"]'); if(grp)[...grp.children].forEach(b=>{const bv=+b.dataset.v; b.classList.toggle('fill',bv<=r[dim]); b.setAttribute('aria-checked',bv===r[dim]?'true':'false');}); }); }
  else if(r.verdict){ card.querySelectorAll('.vbtn').forEach(b=>b.classList.toggle('on',b.dataset.v===r.verdict)); }
  const note=card.querySelector('.note'); if(note) note.value=r.note||'';
  const sv=card.querySelector('.savebtn'); if(sv) sv.classList.toggle('on',SAVED.has(p.id));
  const on=p.nm?(!!r.verdict||!!(r.note||'').trim()):(r.interest>1||r.match>1||!!(r.note||'').trim());
  card.classList.toggle('rated',on);
}); }

// R1 highlight matched keywords inside the abstract
function hlAbs(text,kws){ let s=esc(text||''); if(!kws||!kws.length) return s;
  const terms=[],seen={}; kws.forEach(k=>{const t=(k.kw||'').trim(); if(t&&!seen[t.toLowerCase()]){seen[t.toLowerCase()]=1; terms.push(t);}}); terms.sort((a,b)=>b.length-a.length);
  const low=s.toLowerCase(), marks=[];
  terms.forEach(t=>{ const tl=esc(t).toLowerCase(); if(!tl)return; let i=0; while((i=low.indexOf(tl,i))>=0){ marks.push([i,i+tl.length]); i+=tl.length; } });
  if(!marks.length) return s; marks.sort((a,b)=>a[0]-b[0]);
  const merged=[]; marks.forEach(m=>{const last=merged[merged.length-1]; if(last&&m[0]<=last[1]) last[1]=Math.max(last[1],m[1]); else merged.push([m[0],m[1]]);});
  let out='',prev=0; merged.forEach(m=>{ out+=s.slice(prev,m[0])+'<mark>'+s.slice(m[0],m[1])+'</mark>'; prev=m[1]; }); return out+s.slice(prev); }

function qaSave(i){ const b=document.querySelector('.savebtn[data-i="'+i+'"]'); if(b){toggleSave(b);return;} const id=PAPERS[i].id; if(SAVED.has(id))SAVED.delete(id); else SAVED.add(id); const q=document.getElementById('qbtn'); if(q)q.textContent='🔖 saved ('+SAVED.size+')'; refreshShelf(); markDirty(); }

function openGraph(){ const g=document.getElementById('graphov'); if(!g)return; g.classList.add('on'); requestAnimationFrame(renderGraph); }

function graphJump(i){ closeGraph(); const o=CARDS[i]; if(o)jumpCard(o); }
function renderGraph(){ const host=document.getElementById('graphsvg'); if(!host)return; const W=host.clientWidth||800, H=host.clientHeight||480;
  const clusters={}; CARDS.forEach(o=>{ const t=o.el.dataset.topic||'Other'; (clusters[t]=clusters[t]||[]).push(o); });
  const keys=Object.keys(clusters).sort((a,b)=>clusters[b].length-clusters[a].length);
  const cols=Math.max(1,Math.ceil(Math.sqrt(keys.length))), rows=Math.max(1,Math.ceil(keys.length/cols));
  let s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  keys.forEach((k,ki)=>{ const cx=((ki%cols)+0.5)*W/cols, cy=(Math.floor(ki/cols)+0.5)*H/rows, arr=clusters[k], R=Math.min(W/cols,H/rows)*0.32;
    s+='<text class="glabel" x="'+cx.toFixed(0)+'" y="'+(cy-R-6).toFixed(0)+'" text-anchor="middle">'+esc(k.slice(0,22))+' ('+arr.length+')</text>';
    arr.forEach((o,i)=>{ const ang=i/Math.max(1,arr.length)*6.2832, r=arr.length>1?R*(0.4+0.55*((i%3)/3)):0, x=cx+Math.cos(ang)*r, y=cy+Math.sin(ang)*r;
      const slug=o.el.dataset.slug||'fyi', rad=(o.p.score==null?5:4+o.p.score*0.7).toFixed(1);
      s+='<circle class="gnode" cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+rad+'" fill="var(--'+slug+')" onclick="graphJump('+o.i+')"><title>'+esc(o.p.title)+'</title></circle>'; }); });
  host.innerHTML=s+'</svg>'; }

<script>
(function(){
  if(!window.SUPA || typeof CARDS==='undefined' || typeof PAPERS==='undefined'){ return; }
  var U=SUPA.url, K=SUPA.key, H={apikey:K,Authorization:"Bearer "+K,"Content-Type":"application/json"};
  document.documentElement.classList.add("shared");
  var PASS=localStorage.getItem("lp_pass")||"", ME=localStorage.getItem("lp_me")||"";
  var COUNTS={}, MYVOTE={}, DETAIL={};
  var VMAP=[["interested","y","★ Interested"],["maybe","m","◐ Maybe"],["not","n","✕ Not for me"]];
  var VL={interested:"★ Interested",maybe:"◐ Maybe",not:"✕ Not"};
  function esc(s){var d=document.createElement("div");d.textContent=(s==null?"":String(s));return d.innerHTML;}
  function t(m){ if(typeof toast==='function') toast(m); }
  function rest(p){ return fetch(U+"/rest/v1/"+p,{headers:H}).then(function(r){return r.json();}); }
  function rpc(fn,b){ return fetch(U+"/rest/v1/rpc/"+fn,{method:"POST",headers:H,body:JSON.stringify(b)})
      .then(function(r){ return r.json().then(function(j){ if(!r.ok) throw (j||{message:r.status}); return j; }); }); }

  function injectVotes(){
    CARDS.forEach(function(o){
      var card=o.el, id=o.p.id;
      if(card.querySelector(".lp-vote")) return;
      var row=document.createElement("div"); row.className="segbar lp-vote";
      VMAP.forEach(function(m){
        var b=document.createElement("button"); b.className="sv "+m[1]; b.dataset.v=m[0];
        b.innerHTML=m[2]+' <span class="n">0</span>';
        b.onclick=function(){ vote(card,id,m[0]); };
        row.appendChild(b);
      });
      var dr=document.createElement("div"); dr.className="lp-detrow";
      var tog=document.createElement("button"); tog.className="lp-dtog"; tog.textContent="who + notes ▾";
      var det=document.createElement("div"); det.className="lp-detail";
      tog.onclick=function(){ det.classList.toggle("open"); };
      dr.appendChild(tog); dr.appendChild(det);
      var anchor=card.querySelector(".flabel")||card.querySelector(".segbar");
      if(anchor){ anchor.parentNode.insertBefore(row,anchor); anchor.parentNode.insertBefore(dr,anchor); }
      else { card.appendChild(row); card.appendChild(dr); }
    });
  }
  function applyCounts(){
    CARDS.forEach(function(o){
      var id=o.p.id, c=COUNTS[id]||{}, mine=MYVOTE[id], row=o.el.querySelector(".lp-vote");
      if(!row) return;
      row.querySelectorAll(".sv").forEach(function(b){
        var v=b.dataset.v, n=(v==="interested"?c.n_interested:v==="maybe"?c.n_maybe:c.n_not)||0;
        b.querySelector(".n").textContent=n; b.classList.toggle("on", mine===v);
      });
      if(mine) o.el.classList.add("rated");
      var det=o.el.querySelector(".lp-detail");
      if(det){ var d=DETAIL[id]||[];
        det.innerHTML=d.length ? d.map(function(x){ return '<div class="who"><b>'+esc(x.rater)+'</b> · '+esc(VL[x.verdict]||x.verdict)+'</div>'+(x.note?'<div class="nt">'+esc(x.note)+'</div>':''); }).join('')
                               : '<div class="who" style="opacity:.6">No ratings yet.</div>'; }
    });
  }
  function loadCounts(){ return rest("rating_counts?select=*").then(function(rows){ COUNTS={}; (rows||[]).forEach(function(r){ COUNTS[r.paper_id]=r; }); }); }
  function loadDetail(){ if(!PASS) return Promise.resolve();
    return rpc("get_detail",{p_pass:PASS}).then(function(rows){ DETAIL={}; MYVOTE={};
      (rows||[]).forEach(function(r){ (DETAIL[r.paper_id]=DETAIL[r.paper_id]||[]).push(r); if(r.rater===ME) MYVOTE[r.paper_id]=r.verdict; }); }).catch(function(){}); }
  function refresh(){ return Promise.all([loadCounts(),loadDetail()]).then(applyCounts); }

  function vote(card,id,v){
    if(!PASS||!ME){ openGate(); return; }
    var noteEl=card.querySelector(".note"), note=noteEl&&noteEl.value.trim()?noteEl.value.trim():null;
    rpc("submit_rating",{p_pass:PASS,p_rater:ME,p_paper_id:id,p_verdict:v,p_note:note})
      .then(function(){ MYVOTE[id]=v; t("Saved ✓"); return refresh(); })
      .catch(function(e){ if(e&&e.message==="bad_passphrase"){ t("Passphrase changed — re-enter"); localStorage.removeItem("lp_pass"); PASS=""; openGate(); }
                          else t((e&&e.message)||"could not save"); });
  }

  function setWho(){
    var host=document.querySelector("header .brand")||document.querySelector("header");
    if(!host) return; var w=document.getElementById("lp-who");
    if(!w){ w=document.createElement("span"); w.id="lp-who"; w.className="lp-who"; host.appendChild(w); }
    w.innerHTML = ME ? 'rating as <b>'+esc(ME)+'</b> · <button id="lp-switch">switch</button>' : '';
    var sw=document.getElementById("lp-switch"); if(sw) sw.onclick=function(){ localStorage.removeItem("lp_me"); localStorage.removeItem("lp_pass"); location.reload(); };
  }

  function openGate(){
    if(document.querySelector(".lp-gate")) return;
    var g=document.createElement("div"); g.className="lp-gate";
    g.innerHTML='<div class="gc"><h1>Enter the lab</h1><p>One-time: the shared lab passphrase, then your name. Saved on this browser.</p>'+
      '<div class="s1"><label>Lab passphrase</label><input type="password" class="pin" autocomplete="off"><div class="er e1"></div><button class="go g1">Continue</button></div>'+
      '<div class="s2 lp-hide"><label>You are…</label><select class="nin"></select><button class="go g2">Enter</button></div></div>';
    document.body.appendChild(g);
    var pin=g.querySelector(".pin"), e1=g.querySelector(".e1");
    g.querySelector(".g1").onclick=function(){ var p=pin.value.trim(); if(!p) return; e1.textContent="";
      rpc("get_roster",{p_pass:p}).then(function(roster){ PASS=p; localStorage.setItem("lp_pass",p);
        var sel=g.querySelector(".nin"); sel.innerHTML=(roster||[]).map(function(m){ return '<option value="'+esc(m.initials)+'">'+esc(m.display)+' ('+esc(m.initials)+')</option>'; }).join('');
        if(ME) sel.value=ME;
        g.querySelector(".s1").classList.add("lp-hide"); g.querySelector(".s2").classList.remove("lp-hide");
      }).catch(function(e){ e1.textContent=(e&&e.message==="bad_passphrase")?"Wrong passphrase.":"Could not verify — try again."; }); };
    pin.addEventListener("keydown",function(e){ if(e.key==="Enter") g.querySelector(".g1").click(); });
    g.querySelector(".g2").onclick=function(){ ME=g.querySelector(".nin").value; if(!ME) return; localStorage.setItem("lp_me",ME); g.remove(); setWho(); refresh(); };
    pin.focus();
  }

  // boot
  injectVotes(); setWho();
  loadCounts().then(applyCounts);
  if(PASS&&ME){ loadDetail().then(applyCounts); } else { openGate(); }
})();
</script>
