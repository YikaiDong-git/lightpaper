<script>
const PAPERS = [{"id": "10.64898/2026.07.01.735728", "doi": "10.64898/2026.07.01.735728", "title": "Pangenome-based human genome analysis improves trait association and genomic prediction", "venue": "bioRxiv", "date": "2026-07-03", "url": "https://doi.org/10.64898/2026.07.01.735728", "score": 9, "project": "Centromere", "why": "HPRC (watchlist): 462 open-access reference genomes + a variation graph, with a graph-based trait-mapping method shown to improve eQTL association and genomic prediction over a single linear reference — squarely your pangenome/complete-genome + stat-gen axes.", "abstract": "Abstract The Human Pangenome Reference Consortium has generated 462 open-access reference genomes and a variation graph that represents differences among them, providing a substrate for pangenome-based analysis methods that overcome the longstanding limitation of comparing all genomic data to a single linear reference. A key unresolved question is the extent to which these approaches can improve trait mapping. We investigate this using the genetics of gene expression variation as a model. We developed a graph-based method (EdgeDepth) for associating sequence variation with traits using short-read genome sequencing data, and show that it captures complex forms of genetic variation missed by other methods. We evaluated trait mapping performance using 430 samples with deep RNA-seq data, and found that pangenomic methods enable the detection of expression quantitative trait loci involving multiallelic indels and structural variants, leading to increased power at a subset of genes. These include 812 genes (7.9% of total) with ≥20% improvement in statistical significance relative to the 1000 Genomes Project callset, and 185 (1.8%) with a 50% improvement, 10 of which are candidates to explain prior GWAS results. Notably, these analyses implicate GBAP1 pseudogene copy number as a causal factor in Crohn’s disease, likely via miRNA-mediated regulation of GBA1 , which explains prior GWAS ", "resource": "HPRC 462-genome pangenome + graph-based trait mapping", "tier": "Must-read", "matched": [{"kw": "pangenome", "src": "core:centromere/T2T"}, {"kw": "gwas", "src": "core:statistical genetics"}, {"kw": "structural variant", "src": "core:structural variation"}, {"kw": "copy number", "src": "core:structural variation"}], "suggest": ["variation graph", "graph-based trait mapping", "eQTL mapping", "genomic prediction"], "authors": "", "year": "2026", "hi": false, "nm": false}, {"id": "10.1016/j.breast.2026.104860", "doi": "10.1016/j.breast.2026.104860", "title": "The landscape of clonal hematopoiesis of indeterminate potential in long-term breast cancer survivors.", "venue": "The Breast", "date": "2026-07-08", "url": "https://doi.org/10.1016/j.breast.2026.104860", "score": 8, "project": "clonal hematopoiesis / Breast-cancer genetics", "why": "NEW theme x focus disease: clonal-hematopoiesis (CHIP) landscape by WES in breast-cancer survivors, with a 100-gene hematopoietic-driver compendium — hits both clonal hematopoiesis and breast cancer.", "abstract": "BackgroundClonal hematopoiesis of indeterminate potential (CHIP) can confound blood-based genomics and may be shaped by cytotoxic therapy; clarifying its persistence after breast-cancer chemotherapy is relevant for long-term survivorship follow-up.Patients and methodsBuffy-coat whole-exome sequencing was performed in 189 stage I-III breast-cancer survivors with blood collected a median 136.5 months after diagnosis. CHIP was assessed using a prespecified 100-gene hematopoietic-driver compendium and exome-wide interrogation. Clinical associations were assessed with univariable tests and multivariable logistic regression including chemotherapy, radiotherapy, age, smoking and obesity.ResultsWithin the 100-gene compendium, 54/189 (28.6%) patients harbored ≥1 variant, predominantly missense, with DNMT3A and TET2 predominating and multi-hit cases rare. In multivariable models, chemotherapy was not associated with panel-defined CHIP (OR 0.77; 95% CI 0.40-1.48; p = 0.432). Similarly, age, adjuvant radiotherapy, obesity and smoking status were not significantly associated with panel-defined CHIP. Gene-level comparisons showed no differences by chemotherapy exposure. Exome-wide, 67/189 (35.4%) patients carried ≥1 variant; chemotherapy was not associated with exome-wide variant positivity (OR 0.89; 95% CI 0.48-1.67; p = 0.721), and no locus differed between chemotherapy-exposed and never-e", "resource": "", "tier": "Must-read", "matched": [{"kw": "exome", "src": "core:statistical genetics"}, {"kw": "breast cancer", "src": "core:disease genetics"}, {"kw": "clonal hematopoiesis", "src": "core:clonal hematopoiesis"}], "suggest": ["breast cancer survivors", "whole-exome sequencing", "hematopoietic driver genes"], "authors": "Gálvez-Carvajal L, Comino-Méndez I, López-López E, Ríos A, Zamorano E, Sequero S, González Á, Ruíz S, Ocaña MC, Garrido-Aranda A, Lavado-Valenzuela R, Rueda-Domínguez A, Pascual J, Alba E.", "year": "2026", "hi": false, "nm": false}, {"id": "10.64898/2026.07.13.738312", "doi": "10.64898/2026.07.13.738312", "title": "Reliability-weighted target prioritization in CD4+ T-cell Perturb-seq: a generalizability-theory decomposition", "venue": "bioRxiv", "date": "2026-07-15", "url": "https://doi.org/10.64898/2026.07.13.738312", "score": 8, "project": "perturbation genomics", "why": "NEW theme + method: generalizability-theory reliability decomposition for CD4+ T-cell Perturb-seq target prioritization — perturbation genomics done as a statistical-genetics problem.", "abstract": "Genome-scale Perturb-seq screens prioritize candidate targets by the strength of a perturbation's transcriptional effect. Effect strength does not answer a prior measurement question: is the readout dependable? A large effect estimated from a single guide, a single donor, or a pseudobulk of few cells need not survive replication, and for target prioritization each false lead costs a validation experiment. We treat each perturbation effect as a measurement in a crossed Target x Guide x Donor x Condition design and apply generalizability theory (Cronbach et al., 1972; Brennan, 2001) to separate the dependable part of an effect from facet-specific idiosyncrasy. Guides and donors enter as random facets; condition enters as a fixed facet and is analyzed within its levels. For each target we report a dependability profile over the facets and a joint generalizability coefficient over the two random facets, and we re-rank targets by effect magnitude weighted by that coefficient. On the released screen (Zhu et al., 2025), removing the measurement-error floor estimated from the non-targeting controls raises the number of genes with a dependable target-signal share above .10 from 40 to 7,674. Analyzed within activation states, dependability recovers the T-cell-receptor signaling module as reliably measurable only in activated cells, without recourse to gene annotation. A design study indi", "resource": "", "tier": "Must-read", "matched": [{"kw": "perturb-seq", "src": "core:perturbation genomics"}], "suggest": ["single-cell CRISPR", "generalizability theory", "target prioritization", "CD4 T-cell"], "authors": "Cheng, C.", "year": "2026", "hi": false, "nm": false}, {"id": "10.64898/2026.06.29.26356716", "doi": "10.64898/2026.06.29.26356716", "title": "Multi-ancestry modeling improves fine-mapping resolution, protein prediction, and discovery for proteome-wide association studies", "venue": "medRxiv", "date": "2026-07-01", "url": "https://doi.org/10.64898/2026.06.29.26356716", "score": 8, "project": "Centromere (TOPMed-MESA pivot)", "why": "Releases multi-ancestry cis/trans-pQTL and protein-prediction models from TOPMed-MESA (Olink+WGS, 4 ancestries) — directly reusable for the P1 TOPMed-MESA pivot and any PWAS.", "abstract": "ABSTRACT Proteomic predictive models are predominantly trained on cis-acting variants in European-ancestry cohorts, limiting power and predictive accuracy in ancestrally diverse populations. We performed cis - and trans -protein quantitative trait locus (pQTL) mapping and developed protein-prediction models using whole-genome sequencing (WGS) and plasma protein levels (Olink) across four ancestry groups from the Trans-omics for Precision Medicine (TOPMed) Multi-Ethnic Study of Atherosclerosis (MESA): European (EUR, n=1270), African (AFR, n=675), Hispanic (HIS, n=642), and Chinese (CHN, n=366), and a combined population (ALL, n=2953). African-ancestry samples demonstrated improved fine-mapping resolution relative to cohort size, yielding significantly smaller cis-credible sets than European-ancestry samples, consistent with shorter linkage disequilibrium (LD) blocks and greater allele frequency diversity in African-ancestry populations. For the first time, we benchmarked fine-mapping models SuSiE, SuShiE, MultiSuSiE, and SuSiEx with multi-ancestral cohorts, revealing a precision-recall tradeoff driven by model assumptions. Comparing protein-prediction models, multivariate adaptive shrinkage (MASHR) and ultimate deconvolution in R (UDR) outperformed elastic net (EN) regression, with trans -pQTL inclusion and fine-mapping improving prediction performance and proteome-wide associat", "resource": "multi-ancestry cis/trans-pQTL + protein-prediction models (TOPMed MESA)", "tier": "Must-read", "matched": [{"kw": "fine-mapping", "src": "core:statistical genetics"}, {"kw": "proteome-wide association", "src": "core:statistical genetics"}, {"kw": "pwas", "src": "core:statistical genetics"}], "suggest": ["pQTL mapping", "protein prediction models", "multi-ancestry fine-mapping", "TOPMed MESA", "Olink proteomics"], "authors": "", "year": "2026", "hi": false, "nm": false}, {"id": "10.5281/zenodo.21296856", "doi": "10.5281/zenodo.21296856", "title": "High false sign rates in transcriptome-wide association studies", "venue": "Zenodo (CERN European Organization for Nuclear Research)", "date": "2026-07-10", "url": "https://doi.org/10.5281/zenodo.21296856", "score": 8, "project": "Centromere (cTWAS)", "why": "Methods repo quantifying false sign rates in TWAS with released scripts + PPH4 estimates for plasma proteins and complex traits — direct to the P1 cTWAS/coloc-SuSiE work.", "abstract": "This repository contains scripts and data from \"High false sign rates in transcriptome-wide association studies\". The supplementary data contains TWAS estimates, coloc, and coloc-SuSiE PPH4 probabilities for the plasma protein and complex traits analyses and cTWAS results for the plasma proteins. Scripts for running TWAS (FUSION), coloc, coloc-SuSiE, cTWAS, and simulations are in \"Scripts_and_helpers\". For questions please contact pgerlach@stanford.edu", "resource": "TWAS/coloc-SuSiE/cTWAS scripts + PPH4 estimates", "tier": "Must-read", "matched": [{"kw": "coloc", "src": "core:statistical genetics"}, {"kw": "twas", "src": "core:statistical genetics"}, {"kw": "ctwas", "src": "core:statistical genetics"}, {"kw": "transcriptome-wide", "src": "core:statistical genetics"}], "suggest": ["coloc-SuSiE", "FUSION", "plasma proteins"], "authors": "", "year": "2026", "hi": false, "nm": false}, {"id": "10.1101/2025.05.13.653434", "doi": "10.1101/2025.05.13.653434", "title": "ATaRVa: Analysis of Tandem Repeat Variation from Long Read Sequencing data", "venue": "bioRxiv", "date": "2026-07-14", "url": "https://doi.org/10.1101/2025.05.13.653434", "score": 8, "project": "Centromere/Long-read genome", "why": "ATaRVa: long-read (PacBio+ONT) tandem-repeat genotyper for human repeat/expansion variation — your long-read + complex-repeat axis, released reusable tool.", "abstract": "Tandem Repeats (TRs) are contiguous repetitions of DNA motifs whose variations modulate key cellular processes and traits. Their expansions are causally linked to over 70 neurological disorders in humans. Historically, genotyping TRs has been challenging due to their low sequence complexity and allele lengths exceeding typical short-read sequencing capabilities. While long-read sequencing improves TR genotyping by spanning large expansions and sequencing native DNA molecules, existing long-read genotypers often are inaccurate, computationally inefficient, and show platform-specific biases. Here, we present ATaRVa, a genotyper that achieves superior accuracy across both PacBio and Oxford Nanopore platforms, while running [~]15x faster than existing tools. Beyond genotyping, ATaRVa features sequence-level motif decomposition and methylation profiling. Evaluated across diverse datasets and genome-wide catalogs, ATaRVa especially excels in low coverage datasets, and accurately identifies known pathogenic expansions in clinical samples. Importantly, by quantifying uninterrupted target motifs in a population scale analysis, the tool systematically resolves false positives caused by benign, interrupted alleles. In addition, we present VisuaMiTRa, an auxiliary interface that enables interactive visualization of motif-level decomposition and base-level methylation of the TR alleles. By ", "resource": "ATaRVa long-read tandem-repeat genotyper", "tier": "Must-read", "matched": [{"kw": "long-read", "src": "core:long-read/under-explored"}, {"kw": "long read", "src": "core:long-read/under-explored"}, {"kw": "nanopore", "src": "core:long-read/under-explored"}, {"kw": "pacbio", "src": "core:long-read/under-explored"}, {"kw": "methylation", "src": "core:long-read/under-explored"}, {"kw": "tandem repeats", "src": "pool:From digest (user-added)"}], "suggest": ["long-read sequencing", "Oxford Nanopore", "repeat expansion"], "authors": "Sivakumar, A. K.; Sharma, A.; Sudarsanam, S.; Krishnavajjhala, S. S.; Dashnow, H.; Avvaru, A. K.; Sowpati, D. T.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1002/sim.70667", "doi": "10.1002/sim.70667", "title": "Bayesian Bidirectional Mendelian Randomization Under Correlated and Uncorrelated Pleiotropy Using GWAS Summary Statistics.", "venue": "Statistics in Medicine", "date": "2026-07-01", "url": "https://doi.org/10.1002/sim.70667", "score": 8, "project": "ASD long-read / Breast-cancer genetics", "why": "BayBiMR: Bayesian bidirectional Mendelian randomization from GWAS summary stats handling correlated/uncorrelated pleiotropy — a core stat-gen method you can reuse.", "abstract": "Mendelian randomization (MR) uses genetic variants as instruments to study causal relationships between traits. Standard unidirectional MR approaches are vulnerable to pleiotropy and typically assume that pleiotropic effects are independent of instrument strength, assumptions that may fail when causation operates in both directions. We propose BayBiMR, a Bayesian bidirectional MR framework that jointly estimates causal effects in both directions while modeling both correlated and uncorrelated pleiotropy through a hierarchical spike-and-slab prior on pleiotropic effects and an Inverse-Wishart prior on the joint covariance of direct and pleiotropic SNP effects. The likelihood is based on a small-feedback reduced-form approximation to the underlying simultaneous-equation model, which preserves conjugacy and enables efficient closed-form posterior computation. Posterior inference is carried out via a blocked Gibbs sampler, and a data-perturbation extension, BayBiMR(DP), is provided to improve empirical frequentist calibration in finite samples. Simulation studies show that BayBiMR and BayBiMR(DP) provide better type I error control than existing methods in the settings considered, particularly under correlated and mixed pleiotropy. Applications to large-scale GWAS summary statistics on white-matter (WM) microstructures, BMI, sleep duration, and neuroticism illustrate the method's p", "resource": "BayBiMR (Bayesian bidirectional MR)", "tier": "Must-read", "matched": [{"kw": "gwas", "src": "core:statistical genetics"}, {"kw": "mendelian randomization", "src": "core:statistical genetics"}], "suggest": ["GWAS summary statistics", "Bayesian method", "causal inference"], "authors": "Chen S.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1038/s41588-026-02674-z", "doi": "10.1038/s41588-026-02674-z", "title": "Pervasive interactions between exposures and polygenic risk can inform more effective clinical and behavioral interventions.", "venue": "Nature Genetics", "date": "2026-07-13", "url": "https://doi.org/10.1038/s41588-026-02674-z", "score": 8, "project": "statistical genetics", "why": "Nature Genetics: PGS-by-context interaction across 7 diseases x 75 contexts in UK Biobank — squarely on PGS generalizability / GxE, central to complex-trait risk work.", "abstract": "The generalizability of polygenic scores (PGS) remains a major hurdle in the pursuit of equitable genomic medicine. Differences in disease prevalence across groups, potentially including social strata, influence the relationship between PGS and risk. Here we quantified the magnitude of PGS-by-context (PGS×C) interactions for seven human diseases and pairs of 75 contexts in the UK Biobank (n = 408,801). Across 24,198 PGS×C models, 746 (3.1%) had significant interactions by two criteria, up to fourfold more than expected by chance, improving predictive accuracy. The predominant mechanism for PGS×C is the amplification of genetic effects in adverse contexts, such as low polyunsaturated fatty acids or social determinants of ill health. We introduce the notion of the proportion needed to benefit as a metric that quantifies the expected effectiveness of interventions as a function of polygenic risk. Our results highlight the need for more comprehensive sampling across groups experiencing adverse exposures.", "resource": "", "tier": "Must-read", "matched": [{"kw": "polygenic", "src": "core:statistical genetics"}], "suggest": ["polygenic score", "gene-environment interaction", "UK Biobank", "PGS generalizability", "risk prediction"], "authors": "Nagpal S, Gibson G.", "year": "2026", "hi": true, "nm": false}, {"id": "10.1038/s41586-026-10780-5", "doi": "10.1038/s41586-026-10780-5", "title": "A Bayesian framework for longitudinal EHR and genetic discovery.", "venue": "Nature", "date": "2026-07-15", "url": "https://doi.org/10.1038/s41586-026-10780-5", "score": 8, "project": "statistical genetics", "why": "Nature: ALADYNOULLI, a Bayesian generative model jointly fitting longitudinal EHR diagnoses + polygenic risk across three biobanks — high-impact disease-architecture modeling.", "abstract": "Electronic health records (EHRs) provide rich longitudinal disease histories, but existing methods for analysing these data typically treat diseases in isolation1 and rarely integrate germline genetics. Here we present ALADYNOULLI, a Bayesian generative framework that jointly models longitudinal EHR diagnoses, age and polygenic risk to recover latent time-varying disease signatures and patient-specific signature loadings; the model is formulated as a mixture of probabilities rather than a probability of a mixture2, correctly accommodating simultaneous and chronic conditions. Applied to three independent biobanks (UK Biobank3, Mass General Brigham4 and All of Us; total n > 683,000) spanning up to 52 years of follow-up and 348 diseases, the model recovers 21 replicable signatures with high cross-cohort composition preservation (median of 80%) and reveals biological subtypes within diagnostic categories (Cohen's d up to 4.25; P ≤ 1 × 10-8 for 95% of comparisons). Signatures are concordant with established disease biology: carriers of familial hypercholesterolaemia5 enrich in the cardiovascular signature; carriers of clonal haematopoiesis of indeterminate potential6 in the inflammation signature; and a rare variant burden in LDLR, TTN and BRCA2 (refs. 7,8) aligns with disease specificities. A signature-based genome-wide association study identifies 151 genome-wide significant loci ", "resource": "ALADYNOULLI framework", "tier": "Must-read", "matched": [{"kw": "genome-wide association", "src": "core:statistical genetics"}, {"kw": "polygenic", "src": "core:statistical genetics"}, {"kw": "rare variant", "src": "core:statistical genetics"}, {"kw": "clonal haematopoiesis", "src": "core:clonal hematopoiesis"}], "suggest": ["Bayesian generative model", "electronic health records", "polygenic risk", "UK Biobank", "latent disease signatures"], "authors": "Urbut SM, Ding Y, Nakao T, Koyama S, Misra A, Jiang X, Harish A, Gaffney L, Hornsby WE, Smoller JW, Gusev A, Natarajan P, Parmigiani G.", "year": "2026", "hi": true, "nm": false}, {"id": "10.1016/j.cell.2026.06.027", "doi": "10.1016/j.cell.2026.06.027", "title": "Whole-transcriptome-scale isoform-resolved spatial imaging of single cells in tissues.", "venue": "Cell", "date": "2026-07-16", "url": "https://doi.org/10.1016/j.cell.2026.06.027", "score": 8, "project": "Single-cell/spatial", "why": "Cell: whole-transcriptome isoform-resolved spatial transcriptomics (in-situ RNA amplification + MERFISH) — your single-cell/spatial-transcriptomics axis, transferable technology.", "abstract": "Cell and tissue functions arise from complex interactions among numerous genes, and a systematic understanding of these functions requires isoform-resolved transcriptomic analysis of single cells with high spatial resolution. Here, we introduce an in situ RNA amplification method and its integration with multiplexed error-robust fluorescence in situ hybridization (MERFISH) to detect short RNA sequences and enable whole-transcriptome-scale, isoform-resolved spatial transcriptomics of individual cells in intact tissues. Using this approach, we imaged ∼33,000 distinct RNAs-including ∼23,000 genes and ∼10,000 isoforms-in the mouse brain. Our data enabled systematic analyses of region- and cell-type-specific gene programs and ligand-receptor-based cell-cell communications. These data further revealed rich spatial diversity and cell-type specificity in isoform usage across numerous genes, as well as brain structures particularly rich in isoform specificity. We anticipate broad application of this method for characterizing the molecular and cellular basis of tissue functions, unlocking previously inaccessible discoveries in cell and organismal biology.", "resource": "isoform-resolved MERFISH spatial method", "tier": "Must-read", "matched": [{"kw": "single cell", "src": "core:single-cell/spatial"}, {"kw": "spatial transcriptomic", "src": "core:single-cell/spatial"}, {"kw": "cell-cell communication", "src": "core:single-cell/spatial"}, {"kw": "aging", "src": "core:aging/cell-death"}], "suggest": ["MERFISH", "spatial transcriptomics", "isoform resolution", "in situ RNA amplification", "single-cell imaging"], "authors": "Cohen L, Halpern AR, Blosser TR, Che ZP, Pan X, Zhuang X.", "year": "2026", "hi": true, "nm": false}, {"id": "10.64898/2026.07.14.26357983", "doi": "10.64898/2026.07.14.26357983", "title": "Multimodal gene prioritization reveals nonlinear regulatory architecture in childhood-onset asthma", "venue": "medRxiv", "date": "2026-07-16", "url": "https://doi.org/10.64898/2026.07.14.26357983", "score": 7, "project": "statistical genetics", "why": "Large asthma GWAS meta-analysis (275 loci, SNP-h2) plus a transferable multimodal nonlinear gene-prioritization framework integrating GWAS+eQTL.", "abstract": "Asthma is a heritable complex disease that disproportionately burdens minority and admixed populations in the US. However, the causal genes and regulatory mechanisms governing inherited risk remain largely unresolved. We performed a European-ancestry meta-analysis of 141,894 cases and 1,361,846 controls drawn from the Trans-national Asthma Genetic Consortium (TAGC) and Global Biobank Meta-analysis Initiative (GBMI), yielding an estimated h2SNP of 0.056 (SE = 0.0038) and 275 independently associated loci. To enhance mechanistic inference beyond variant-level associations, we developed a multimodal framework to predict asthma risk integrating GWAS summary statistics, bulk tissue expression quantitative trait loci (eQTL) data from the Genotype-Tissue Expression (GTEx) project, and single-cell gene eQTL data from the OneK1K Project. We performed transcriptome-wide association studies (TWAS) and subsequently applied probabilistic fine-mapping with FOCUS to prioritize putative causal genes expressed in bulk tissues and higher resolution immune cell populations. Fine-mapping asthma-associated genes implicated barrier-immune and metabolic-endocrine tissues alongside adaptive T-cell subsets as the primary mediators of asthma genetic risk, resolving canonical CD4+ Th2 effector genes including IL1RL1, TSLP, STAT6, and GATA3. Using these prioritized genes, we constructed a polygenic transc", "resource": "asthma GWAS (275 loci) + multimodal prioritization framework", "tier": "Worth a look", "matched": [{"kw": "gwas", "src": "core:statistical genetics"}, {"kw": "fine-mapping", "src": "core:statistical genetics"}, {"kw": "polygenic", "src": "core:statistical genetics"}, {"kw": "twas", "src": "core:statistical genetics"}, {"kw": "transcriptome-wide", "src": "core:statistical genetics"}, {"kw": "single-cell", "src": "core:single-cell/spatial"}], "suggest": ["asthma GWAS meta-analysis", "multimodal gene prioritization", "eQTL", "SNP heritability", "admixed populations"], "authors": "Huang, N.; Ragsac, M. F.; Gui, X.; Tantisira, K. G.; Amariuta, T.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1002/sim.70675", "doi": "10.1002/sim.70675", "title": "Multi-Level Latent Variable Models for Coheritability Analysis in Electronic Health Records.", "venue": "Statistics in Medicine", "date": "2026-07-01", "url": "https://doi.org/10.1002/sim.70675", "score": 7, "project": "statistical genetics", "why": "New latent-variable framework for heritability and coheritability (genetic correlation) from EHR family data — a stat-gen methods paper.", "abstract": "Electronic health records (EHRs) linked with familial relationship data offer a unique opportunity to investigate the genetic architecture of complex phenotypes at scale. However, existing heritability and coheritability estimation methods often fail to account for the intricacies of familial correlation structures, heterogeneity across phenotype types, and computational scalability. We propose a robust and flexible statistical framework for jointly estimating heritability and genetic correlation among continuous and binary phenotypes in EHR-based family studies. Our approach builds on multi-level latent variable models to decompose phenotypic covariance into interpretable genetic and environmental components, incorporating both within- and between-family variations. We derive iteration algorithms based on generalized equation estimations (GEE) for estimation. Simulation studies under various parameter configurations demonstrate that our estimators are consistent and yield valid inference across a range of realistic settings. Applying our methods to real-world EHR data from a large, urban health system, we identify significant genetic correlations between mental health conditions and endocrine/metabolic phenotypes, supporting hypotheses of shared etiology. This work provides a scalable and rigorous framework for coheritability analysis in high-dimensional EHR data and facilitat", "resource": "", "tier": "Worth a look", "matched": [{"kw": "heritability", "src": "core:statistical genetics"}, {"kw": "genetic correlation", "src": "core:statistical genetics"}], "suggest": ["heritability estimation", "electronic health records", "latent variable model", "familial correlation"], "authors": "Zhao Y, Tatonetti N, Wang Y.", "year": "2026", "hi": false, "nm": false}, {"id": "10.64898/2026.06.18.26355973", "doi": "10.64898/2026.06.18.26355973", "title": "Integration of lung tissue proteomics and genome-wide association data to identify lung cancer susceptibility proteins and potential drug targets", "venue": "medRxiv", "date": "2026-06-22", "url": "https://doi.org/10.64898/2026.06.18.26355973", "score": 7, "project": "PWAS", "why": "PWAS building lung-tissue protein-prediction models applied to lung-cancer GWAS — your proteome-wide axis plus reusable tissue pQTL/proteome models.", "abstract": "Background: Proteins directly impact disease development and act as drug targets. Therefore, we integrated genomic and lung tissue proteomics data to identify lung cancer susceptibility proteins, elucidating genetic mechanisms and candidate drug targets. Method: We profiled the proteome and genome in non-neoplastic lung tissue from 200 lung cancer patients. Using this data, we constructed genetic models to predict abundance across the proteome in lung tissue. We applied these models to genome-wide association study (GWAS) data from 55,174 lung cancer cases and 1,294,174 controls to evaluate their associations with the risk of lung cancer, overall and by major histological subtypes. Bayesian colocalization and Mendelian randomization (MR) analyses were used to prioritize putative causal proteins, which were cross-referenced with three main drug-protein databases to identify potential therapeutic targets. Results: We identified 29 proteins associated with lung cancer risk at a false discovery rate < 5%, including 25 for overall lung cancer, two (AQP3 and IL18) specifically for adenocarcinoma, and another two (HMGN2 and HLA-DMB) for squamous cell carcinoma. Of them, genes encoding 17 proteins reside at least 2Mb away from any known GWAS risk loci, including 14 for overall lung cancer (HYI, GPX1, GMPPB, DSP, HDDC2, MTCH2, SUOX, JMJD7, PDIA3, IL16, IQGAP1, SULT1A2, ARHGAP27, and TYM", "resource": "lung-tissue proteome prediction / pQTL models", "tier": "Worth a look", "matched": [{"kw": "gwas", "src": "core:statistical genetics"}, {"kw": "genome-wide association", "src": "core:statistical genetics"}, {"kw": "colocalization", "src": "core:statistical genetics"}, {"kw": "coloc", "src": "core:statistical genetics"}, {"kw": "mendelian randomization", "src": "core:statistical genetics"}], "suggest": ["proteogenomics", "lung tissue proteome", "GWAS integration", "drug targets"], "authors": "", "year": "2026", "hi": false, "nm": false}, {"id": "10.64898/2026.07.10.26357754", "doi": "10.64898/2026.07.10.26357754", "title": "Genome-wide association study highlights 44 loci for transient ischemic attack and shared genetic architecture with stroke", "venue": "medRxiv", "date": "2026-07-14", "url": "https://doi.org/10.64898/2026.07.10.26357754", "score": 7, "project": "statistical genetics", "why": "Multi-ancestry TIA GWAS (44 loci) with cross-trait shared-architecture analysis vs stroke — on your shared-architecture/pleiotropy theme, released loci.", "abstract": "Transient ischemic attack (TIA) is a critical harbinger of subsequent stroke, and most genetic risk remains uncharacterized. Here we firstly performed the largest TIA genome-wide association study (GWAS) meta analysis in 1,332,453 European individuals (58,976 cases and 1,273,477 controls), followed by an independent replication in 610,409 non-European individuals (23,557 TIA and 586,852 controls), a multi-ancestry GWAS meta analysis in 1,942,862 individuals (82,533 cases and 1,860,329 controls), and a cross-trait GWAS meta-analysis of TIA with stroke and its subtypes. We identified 44 loci including 25 known stroke loci and 19 TIA specific loci (CELSR2, SLC4A7, CASC15, SRRM3, SLC44A1, LOC107984361, GSE1, LOC105372530, HCG20, OXR1, SLC4A1, RBBP8, TUSC3, DCC, PALMD, ZNF475, CTAGE1, FUT2 and MRPS6). Post-GWAS pinpointed 51 high confidence genes (24 are potential therapeutic targets) and 13 statistically significant pathways including protein-lipid complex, neurofibrillary tangle, high-density lipoprotein particle. These findings provide critical insights into the genetic basis of TIA.", "resource": "TIA GWAS summary stats (44 loci)", "tier": "Worth a look", "matched": [{"kw": "gwas", "src": "core:statistical genetics"}, {"kw": "genome-wide association", "src": "core:statistical genetics"}], "suggest": ["GWAS meta-analysis", "transient ischemic attack", "shared genetic architecture", "cross-trait", "multi-ancestry"], "authors": "Hu, S.; Zhu, P.; Wu, S.; Gao, S.; Wang, R.; Liu, F.; He, Y.; Han, Z.; Wang, T.; Wang, M.; Ren, C.; Ji, X.; Zhao, W.; Li, S.; Liu, G.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1016/j.cpnec.2026.100357", "doi": "10.1016/j.cpnec.2026.100357", "title": "Genomic structural equation modeling elucidates the genetic mechanisms underlying allostatic load.", "venue": "Comprehensive Psychoneuroendocrinology", "date": "2026-06-25", "url": "https://doi.org/10.1016/j.cpnec.2026.100357", "score": 7, "project": "statistical genetics", "why": "Genomic SEM deriving a shared latent genetic factor for allostatic load across cardiometabolic/inflammatory GWAS — core shared-architecture method.", "abstract": "BackgroundAllostatic load (AL) represents the cumulative physiological burden arising from chronic stress across neuroendocrine, immune, metabolic, and cardiovascular systems. Although AL is strongly associated with cardiometabolic and inflammatory diseases, its underlying genetic architecture remains poorly characterized.MethodsWe integrated genome-wide association summary statistics for five AL-related phenotypes-systolic blood pressure, white blood cell count, C-reactive protein, body mass index, and triglycerides-using Genomic Structural Equation Modeling (Genomic SEM) to derive a latent genetic factor indexing the shared cardiovascular, inflammatory, and metabolic components of AL. A common-factor model was fitted to derive a latent genetic representation of AL, followed by multivariate GWAS of the latent factor. Downstream analyses included functional annotation, Bayesian fine-mapping, transcriptome-wide association analysis (TWAS), pathway enrichment, cell type-specific heritability estimation, and partitioned SNP heritability analyses.ResultsThe common-factor model showed good fit (CFI = 0.964; SRMR = 0.037), supporting a shared genetic architecture across the five AL-related traits. Functional annotation indicated that AL-associated variants were predominantly located in non-coding regulatory regions. Pathway enrichment analyses implicated metabolic regulation, lipid p", "resource": "", "tier": "Worth a look", "matched": [{"kw": "gwas", "src": "core:statistical genetics"}, {"kw": "genome-wide association", "src": "core:statistical genetics"}, {"kw": "heritability", "src": "core:statistical genetics"}, {"kw": "fine-mapping", "src": "core:statistical genetics"}, {"kw": "twas", "src": "core:statistical genetics"}, {"kw": "transcriptome-wide", "src": "core:statistical genetics"}], "suggest": ["Genomic SEM", "shared genetic architecture", "cardiometabolic", "latent factor"], "authors": "Chai S, Jin W, Cui Z, Li B.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1007/s44307-026-00121-y", "doi": "10.1007/s44307-026-00121-y", "title": "Specificity-driven cell-gene graph learning identifies rare cell states in single-cell and spatial transcriptomic data.", "venue": "Advanced Biotechnology", "date": "2026-07-16", "url": "https://doi.org/10.1007/s44307-026-00121-y", "score": 7, "project": "Single-cell/spatial", "why": "scFormer graph-transformer for rare cell states across single-cell AND spatial transcriptomics — your single-cell/spatial axis, released tool.", "abstract": "Detecting rare cell populations that drive development, differentiation, and disease-associated transformation remains a central challenge in biology and medicine. Although these populations often represent promising targets for intervention, they are difficult to resolve from single-cell transcriptomic data because most methods rely on homophily-based cell-cell similarity, which can merge rare cells into dominant populations and mask their subtle transcriptional signatures. The challenge is further amplified in multi-sample analyses, where batch correction can dilute rare-cell-specific signals. Here, we present scFormer, a heterogeneous graph transformer (HGT) framework for sensitive and robust rare-cell discovery. scFormer constructs a Z-score-guided cell-gene heterogeneous graph in which highly specific marker genes serve as informational bridges, embedding rare-cell features directly into the graph topology rather than inferring them from global neighbors. This design provides a clear biological rationale for rare-cell recovery, as low-abundance cells can remain connected through shared high-specificity genes even when local cell-cell neighborhoods are sparse. An integrated optimization strategy jointly performs representation learning, clustering, and optional batch correction, enabling rare-cell discovery while preserving biological structure. Across 125 simulated and 18 ", "resource": "scFormer (rare-cell-state tool)", "tier": "Worth a look", "matched": [{"kw": "single-cell", "src": "core:single-cell/spatial"}, {"kw": "spatial transcriptomic", "src": "core:single-cell/spatial"}], "suggest": ["single-cell transcriptomics", "spatial transcriptomics", "rare cell states", "graph transformer"], "authors": "Huang J, Xia X, Luo F, Qu L, Feng X, Zheng L.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1038/s41386-026-02494-z", "doi": "10.1038/s41386-026-02494-z", "title": "Shared genetic architecture and neurobiological pathways of problematic alcohol use and anxiety disorders.", "venue": "Neuropsychopharmacology", "date": "2026-07-13", "url": "https://doi.org/10.1038/s41386-026-02494-z", "score": 7, "project": "ASD long-read", "why": "Shared genetic architecture of problematic alcohol use and anxiety via MR/MiXeR/LAVA — directly your psychiatric shared-architecture & pleiotropy focus.", "abstract": "Problematic alcohol use (PAU) and anxiety disorders (ANX) frequently co-occur, implying shared genetic and neurobiological foundations. However, the directionality of potential causal relationships and the specific mechanisms underlying the overlap remain unclear. Thus, we investigated the shared genetic architecture and neurobiological pathways between PAU and ANX using a multimethod genomic approach. We analyzed summary statistics from genome-wide association studies (GWAS) of PAU and ANX using Mendelian Randomization to assess causal associations between ANX and PAU. We used MiXeR to assess the overall shared genomic architecture, Local Analysis of (co)Variant Association to estimate regional genetic correlations, and conjunctional false discovery rate (conjFDR) to identify individual overlapping loci. We used FUMA to map single-nucleotide polymorphisms (SNPs) to independent loci, conduct differential gene expression analyses across 30 general and 54 specific tissue types, and perform cell-type specificity analyses using a human brain cell atlas. Druggability of identified targets was also evaluated. Mendelian Randomization analyses indicated bidirectional causal associations between ANX and PAU. MiXeR identified moderate polygenic overlap (52.5%) and genetic correlation (rg = 0.44) between the traits, with high effect direction concordance among shared estimated causal vari", "resource": "", "tier": "Worth a look", "matched": [{"kw": "gwas", "src": "core:statistical genetics"}, {"kw": "genome-wide association", "src": "core:statistical genetics"}, {"kw": "genetic correlation", "src": "core:statistical genetics"}, {"kw": "mendelian randomization", "src": "core:statistical genetics"}, {"kw": "polygenic", "src": "core:statistical genetics"}], "suggest": ["shared genetic architecture", "MiXeR", "LAVA", "psychiatric genetics"], "authors": "Shi M, Gunawan T, Malone SG, Setzer M, Piserchia Z, Davis CN, Rentsch CT, Friligkou E, Zhou H, Polimanti R, Wang L, Vaitinadin NS, Kranzler HR, Gray JC.", "year": "2026", "hi": false, "nm": false}, {"id": "10.64898/2025.12.09.693295", "doi": "10.64898/2025.12.09.693295", "title": "Machine learning-based prediction of human structural variation and characterization of associated sequence determinants", "venue": "bioRxiv", "date": "2026-07-15", "url": "https://doi.org/10.64898/2025.12.09.693295", "score": 7, "project": "structural variation", "why": "ML (CNN/random-forest) models predicting structural-variant formation and its sequence determinants in the human genome — your SV/genome-feature axis.", "abstract": "Structural variants (SVs) represent a major source of genetic diversity and play key roles in human disease and evolution. Yet, the extent to which local sequence context shapes the likelihood of structural variant formation remains poorly quantified. Here, we develop machine learning models to predict the occurrence of SVs across the human genome and characterize genomic determinants associated with their formation. We developed both a sequence only-based convolutional neural network (CNN) model as well as a random forest approach integrating diverse genomic annotations. Both models achieve high predictive performance individually (>90% AUROC) which can be further improved in an ensemble. The predictive ability of these models demonstrates that SV-prone regions can be accurately inferred from sequence context. Model interpretability techniques reveal key genomic contributors to SVs, including effects of sequence motifs such as microhomology and non-canonical DNA structures, as well as the presence of SV hotspots. We find that different classes of SVs exhibit distinct sequence determinants, with transposable elements and inversions displaying particularly unique signatures. Moreover, predicted SV probability correlates with allele frequency and gene functional constraint, indicating the potential utility of the model for variant effect prediction. These findings demonstrate tha", "resource": "", "tier": "Worth a look", "matched": [{"kw": "structural variant", "src": "core:structural variation"}, {"kw": "structural variation", "src": "core:structural variation"}, {"kw": "constraint", "src": "core:long-read/under-explored"}], "suggest": ["human genome", "CNN", "sequence determinants"], "authors": "Lim, D.; Lou, R. N.; Ioannidis, N. M.; Sudmant, P. H.", "year": "2026", "hi": false, "nm": false}, {"id": "10.64898/2026.07.15.26358178", "doi": "10.64898/2026.07.15.26358178", "title": "CuGen: A GPU-accelerated framework for large-scale genomics", "venue": "medRxiv", "date": "2026-07-17", "url": "https://doi.org/10.64898/2026.07.15.26358178", "score": 7, "project": "statistical genetics", "why": "CuGen: GPU-accelerated biobank-scale GWAS + in-sample fine-mapping (sparse regression) — a reusable stat-gen tool.", "abstract": "Biobank-scale genomic analyses remain computationally expensive, CPU-bound workflows, particularly when adjusting for confounding. Here, we present CuGen, a GPU-accelerated framework for large-scale genomics. CuGen uses UltraLasso, a novel hierarchical application of univariate-guided sparse regression (uniLasso), to select a compact, phenotype-informed active set of fewer than 30,000 variants. This achieves robust leave-one-chromosome-out (LOCO) confounding control, enabling both downstream GWAS and in-sample fine-mapping. Additionally, we introduce the .cugen file format, a genotype representation designed for memory-optimized, high-throughput streaming and random access on GPU hardware. Building on this substrate, we provide a general GPU-accelerated genomics toolkit handling polygenic prediction, data manipulation, quality control, analysis, and visualization. We demonstrate CuGen's efficacy in the UK Biobank with up to 408,624 individuals, where the full GWAS pipeline and fine-mapping against 6.8 million imputed variants completes in approximately 10 minutes on a single high-throughput GPU with 80 GB of memory. The pipeline scales efficiently to massive phenome-wide analyses with sublinear resource consumption.", "resource": "CuGen GPU GWAS/fine-mapping framework", "tier": "Worth a look", "matched": [{"kw": "gwas", "src": "core:statistical genetics"}, {"kw": "fine-mapping", "src": "core:statistical genetics"}, {"kw": "polygenic", "src": "core:statistical genetics"}], "suggest": ["GPU acceleration", "biobank-scale", "sparse regression"], "authors": "Kiiskinen, T.; Richland, J.; Wang, W.; Lu, W. S.; Balasubramanian, N.; Hastie, T.; Tibshirani, R.; Rivas, M. A.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1016/j.arr.2026.103214", "doi": "10.1016/j.arr.2026.103214", "title": "CHIP In cardiovascular and immune ageing.", "venue": "Ageing Research Reviews", "date": "2026-06-24", "url": "https://doi.org/10.1016/j.arr.2026.103214", "score": 7, "project": "clonal hematopoiesis", "why": "NEW theme: review of clonal hematopoiesis (CHIP; DNMT3A/TET2/ASXL1/JAK2) and cardiovascular/immune-aging risk — grounding for the new clonal-hematopoiesis interest.", "abstract": "Clonal hematopoiesis of indeterminate potential (CHIP) describes the proliferation of blood cell clones that carry driver mutations, such as DNA methyltransferase 3 alpha (DNMT3A), ten-eleven translocation 2 (TET2), additional sex combs like 1 (ASXL1), and Janus kinase 2 (JAK2), without leading to any obvious malignancy. Its occurrence rate is age-related and associated with cardiovascular and immune aging. In prospective cohort studies, CHIP substantially elevated the risk of myocardial infarction, stroke, and heart failure, with a relative risk increase ranging from 1.4 to 2.0-fold. Furthermore, a larger clone size, as indicated by the variant allele fraction (VAF), is correlated with a heightened risk. Both experimental and human evidence support the association of proinflammatory myeloid reprogramming with the loss of ten-eleven translocation 2 (TET2)/DNA methyltransferase 3 alpha (DNMT3A), NOD-like receptor family pyrin domain-containing 3 (NLRP3), interleukin-1 beta (IL-1β), and interleukin-6 (IL-6) signaling, as well as endothelial dysfunction and atherothrombosis. However, the effect sizes vary depending on the specific gene, tissue, and context, and residual confounding remains a concern. This paper reviews the epidemiology and pathophysiology of the disease, its clinical utility, including indications for testing, interpretation of variants, VAF levels, and the added ", "resource": "", "tier": "Worth a look", "matched": [{"kw": "aging", "src": "core:aging/cell-death"}, {"kw": "ageing", "src": "core:aging/cell-death"}, {"kw": "clonal hematopoiesis", "src": "core:clonal hematopoiesis"}], "suggest": ["CHIP", "DNMT3A/TET2", "cardiovascular aging", "variant allele fraction"], "authors": "Chandramoorthy HC, Afzal M, Ali H, Goyal K, Jakhmola V, Gupta G, Alsalem AMS, Chidambaram K.", "year": "2026", "hi": false, "nm": false}, {"id": "10.2967/jnumed.126.272125", "doi": "10.2967/jnumed.126.272125", "title": "Clinical Impact and Dynamics of Clonal Hematopoiesis with 177Lu-PSMA-617 Therapy in Advanced Prostate Cancer.", "venue": "Journal of Nuclear Medicine", "date": "2026-07-16", "url": "https://doi.org/10.2967/jnumed.126.272125", "score": 7, "project": "clonal hematopoiesis", "why": "NEW theme with genomics: targeted NGS of 21 CH-driver genes and clonal dynamics under Lu-PSMA therapy.", "abstract": "The prevalence, clinical impact, and clonal dynamics of clonal hematopoiesis (CH) in patients receiving 177Lu-PSMA-617 (LuPSMA) for metastatic castration-resistant prostate cancer (mCRPC) are unknown. Methods: Targeted next-generation sequencing of 21 genes recurrently mutated in CH was performed on DNA extracted from the peripheral blood of patients who received at least 4 cycles of LuPSMA for mCRPC at our institution between 2022 and 2023. Pathogenic somatic mutations with a variant allele fraction of at least 1% were identified using a standardized pipeline. Clinical outcomes pertaining to efficacy (overall survival [OS], measured from date of planned cycle 5) and hematologic toxicity of LuPSMA were collected from the electronic medical record. Results: Fifty patients treated with LuPSMA were eligible, with a median follow-up of 23 mo. At least 1 CH variant was detected in 33 patients (66%). The most common mutations were TET2 (n = 16), PPM1D (n = 15), and DNMT3A (n = 6). OS was similar in patients with or without CH (12-mo OS, 92% vs. 80%; hazard ratio, 0.89; 95% CI, 0.3-2.68). There was a trend toward greater hematologic toxicity in patients with CH, with a greater need for growth factor support (12% vs. 0%). In patients with serial samples available, the emergence of new clones or expansion of preexisting CH variants was detected in most patients, particularly with PPM1D ", "resource": "", "tier": "Worth a look", "matched": [{"kw": "clonal hematopoiesis", "src": "core:clonal hematopoiesis"}], "suggest": ["targeted NGS", "prostate cancer", "variant allele fraction", "clonal dynamics"], "authors": "Ravi P, Zhong C, Perez KJ, Xie W, Volpe V, Lee GM, Boardman J, Pittard EG, Stoltenberg H, Jacene H, Weeks LD, Sperling AS.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1038/s41375-026-03065-3", "doi": "10.1038/s41375-026-03065-3", "title": "JAK2V617F-positive clonal hematopoiesis in germline BRCA1 versus BRCA2 mutation carriers.", "venue": "Leukemia", "date": "2026-07-15", "url": "https://doi.org/10.1038/s41375-026-03065-3", "score": 7, "project": "clonal hematopoiesis / Breast-cancer genetics", "why": "NEW theme x breast-cancer genetics: JAK2-V617F clonal hematopoiesis in germline BRCA1 vs BRCA2 carriers.", "abstract": "", "resource": "", "tier": "Worth a look", "matched": [{"kw": "clonal hematopoiesis", "src": "core:clonal hematopoiesis"}], "suggest": ["JAK2V617F", "BRCA1/BRCA2", "germline", "somatic mutation"], "authors": "Rodriguez MJ, Hauke J, Kayali M, Baumeister J, de Toledo MAS, Engel C, Meyer R, Hubens W, Wagner W, Wessiepe M, Schmutzler RK, Rhiem K, Brümmendorf TH, Elbracht M, Hahnen E, Koschmieder S.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1016/j.trecan.2026.06.012", "doi": "10.1016/j.trecan.2026.06.012", "title": "Under pressure: clonal hematopoiesis in patients receiving cancer therapy.", "venue": "Trends in Cancer", "date": "2026-07-15", "url": "https://doi.org/10.1016/j.trecan.2026.06.012", "score": 7, "project": "clonal hematopoiesis", "why": "NEW theme: review of clonal-hematopoiesis somatic evolution and clonal selection under cancer-therapy pressure.", "abstract": "In clonal hematopoiesis (CH), hematopoietic stem cells (HSCs) with mutations conferring a fitness advantage preferentially expand under evolutionary constraints. Over the last decade, cancer therapy has emerged as a selective pressure contributing to high rates of CH in patients with hematological and nonhematological cancers. Distinct chemotherapies, radiotherapies, immunotherapies, and targeted cancer therapies shape somatic evolution by inducing de novo mutations and by conferring a selective advantage to pre-existing CH clones. Such expansion may influence treatment response and toxicity, and is linked to the development of therapy-related myeloid neoplasms. CH prevalence will continue to increase as treatment options expand, cancers are detected earlier, and patients live longer. Managing CH and its adverse effects has the potential to improve cancer outcomes and survivorship.", "resource": "", "tier": "Worth a look", "matched": [{"kw": "constraint", "src": "core:long-read/under-explored"}, {"kw": "aging", "src": "core:aging/cell-death"}, {"kw": "clonal hematopoiesis", "src": "core:clonal hematopoiesis"}], "suggest": ["cancer therapy", "clonal evolution", "therapy-related myeloid neoplasm", "somatic mutation"], "authors": "Rondeau V, Cook EK, Vanner RJ.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1093/nargab/lqag070", "doi": "10.1093/nargab/lqag070", "title": "A systematic benchmark of bioinformatics methods for single-cell and spatial RNA-seq nanopore long reads data.", "venue": "NAR Genomics and Bioinformatics", "date": "2026-07-06", "url": "https://doi.org/10.1093/nargab/lqag070", "score": 7, "project": "NUMT/Long-read genome", "why": "Systematic benchmark of single-cell + spatial nanopore long-read RNA tools, with a paired short/long-read benchmark dataset — your long-read + single-cell axes.", "abstract": "Alternative splicing plays a crucial role in transcriptomic complexity, yet remains difficult to resolve at the single-cell level due to the limitations of short-read technologies. Coupling single-cell with long-read sequencing offers full-length transcript coverage, enabling more accurate isoform detection. Diverse computational tools tailored for single-cell and spatial long-read transcriptomics have been developed. To compare the effectiveness of these approaches, we generated paired short-read and Nanopore long-read single-cell datasets, tailored for benchmarking bioinformatics tools. We evaluated ten state-of-the-art methods, spanning four analytical dimensions: barcodes and unique molecular identifiers (UMI) detection, demultiplexing and UMI clustering, gene-level expression profiling, and isoform detection and quantification. Using real and simulated datasets across different protocols, sequencing depths and chemistries, we assessed the accuracy, robustness, and scalability of each tool. Our results revealed method-specific trade-offs, and highlight the importance of sequencing quality and UMI correction strategies. This benchmark provides a practical resource for optimizing isoform analysis and accurate gene expression profiling in single-cell and spatial transcriptomics using long-read sequencing. The workflow employed for benchmarking is designed to be reusable, there", "resource": "paired scRNA short-read + Nanopore long-read benchmark dataset", "tier": "Worth a look", "matched": [{"kw": "long-read", "src": "core:long-read/under-explored"}, {"kw": "long read", "src": "core:long-read/under-explored"}, {"kw": "nanopore", "src": "core:long-read/under-explored"}, {"kw": "single-cell", "src": "core:single-cell/spatial"}, {"kw": "spatial transcriptomic", "src": "core:single-cell/spatial"}], "suggest": ["nanopore long-read", "single-cell RNA-seq", "spatial transcriptomics", "isoform detection", "alternative splicing"], "authors": "Hamraoui A, Onfroy A, Sénamaud-Beaufort C, Coulpier F, Lemoine S, Jourdren L, Thomas-Chollier M.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1038/s41398-026-04244-7", "doi": "10.1038/s41398-026-04244-7", "title": "Glucagon-like peptide-1 receptor activation and mental health: a drug-target mendelian randomization study.", "venue": "Translational Psychiatry", "date": "2026-07-13", "url": "https://doi.org/10.1038/s41398-026-04244-7", "score": 6, "project": "ASD long-read", "why": "Drug-target MR + coloc of GLP-1R across psychiatric / substance-use traits (replicated in FinnGen).", "abstract": "Concerns have been raised about the psychiatric safety of glucagon-like peptide-1 receptor (GLP-1R) agonists, but trial evidence suggests that they ameliorate depressive symptoms. We aimed to assess the associations of GLP-1R activation with mental health well-being and the risk of mental health disorders and substance use disorders. We performed drug-target Mendelian randomization and colocalization analyses using the largest relevant genome-wide association studies and replicated in FinnGen. After correcting for multiple comparisons, genetically predicted lower body mass index (BMI) via GLP-1R activation was associated with a better well-being spectrum (0.06 standard deviation [95% confidence interval 0.03-0.08]), lower risk of major depressive disorder (odds ratio 0.82 [0.75-0.88]), and lower risk of bipolar disorder (odds ratio 0.61 [0.47-0.79]) per 1-kg/m2 decrease in BMI. There was also suggestive evidence that genetically predicted lower BMI via GLP-1R activation was associated with lower risk of substance use disorders. These associations were stronger than the associations for genetically predicted lower BMI and lower glycated hemoglobin (HbA1c) based on genome-wide variants. The posterior probabilities of colocalization of BMI and each significant outcome within 1 Mb of the GLP1R gene were 59.3% for the well-being spectrum, 76.9% for major depressive disorder, and 45.", "resource": "", "tier": "FYI", "matched": [{"kw": "genome-wide association", "src": "core:statistical genetics"}, {"kw": "colocalization", "src": "core:statistical genetics"}, {"kw": "coloc", "src": "core:statistical genetics"}, {"kw": "mendelian randomization", "src": "core:statistical genetics"}], "suggest": ["GLP-1R", "drug-target Mendelian randomization", "FinnGen", "psychiatric disorders"], "authors": "Yang G, Burgess S, Schooling CM.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1192/bjp.2026.10719", "doi": "10.1192/bjp.2026.10719", "title": "Understanding antidepressant change patterns in the UK Biobank.", "venue": "The British Journal of Psychiatry", "date": "2026-07-17", "url": "https://doi.org/10.1192/bjp.2026.10719", "score": 6, "project": "ASD long-read", "why": "SNP-h2 / genetic correlation / PGS of antidepressant & depression outcomes in UK Biobank.", "abstract": "Antidepressants are the most frequently prescribed medications in psychiatry. Medical records of thousands of individuals provide a valuable opportunity to explore prescribing patterns and identify factors that influence treatment outcomes. To investigate antidepressant change patterns in depression and non-depression indications and assess clinical and genetic factors associated with outcomes of antidepressant treatment. Using primary care records from the UK Biobank, we examined outcomes including number of antidepressant changes and discontinuation due to either side-effects or inadequate response. Genetic analyses including heritability estimation, genetic correlation and polygenic score association were performed. A total of 82 633 individuals were prescribed at least 1 antidepressant. Of these, 28 332 individuals with at least 1 primary care depression diagnosis were classified as the depression group, and 24 543 individuals without evidence of depression were classified as the non-depression group. Citalopram and fluoxetine were the most prescribed antidepressants for depression, whereas amitriptyline dominated prescriptions for non-depression indications. Individuals with depression were more likely to stay on antidepressants longer than those without depression and to follow preferred antidepressants that changed over time. Antidepressant changes and discontinuation we", "resource": "", "tier": "FYI", "matched": [{"kw": "heritability", "src": "core:statistical genetics"}, {"kw": "genetic correlation", "src": "core:statistical genetics"}, {"kw": "polygenic", "src": "core:statistical genetics"}], "suggest": ["UK Biobank", "polygenic score", "SNP heritability", "antidepressant response"], "authors": "Li D, Lo CWH, Lewis CM, Vassos E, Breen G.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1159/000553604", "doi": "10.1159/000553604", "title": "Complex Interactions Between Abnormal Thyroid Function and Neurodevelopmental Disorders: A Mendelian Randomization Study.", "venue": "Neuroendocrinology", "date": "2026-07-16", "url": "https://doi.org/10.1159/000553604", "score": 6, "project": "ASD long-read", "why": "Mendelian randomization of thyroid function with neurodevelopmental disorders (ASD/ADHD).", "abstract": "Background Neurodevelopmental disorders (NDDs), such as attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder (ASD), and tic disorders (TD), have been frequently investigated due to their profound impacts on social and emotional functions. In this regard, there is a new focus on the possible association between these disorders and thyroid dysfunction. The purpose of this study is to explore the relationship between NDDs and hyperthyroidism and hypothyroidism. Methods In this study, we used MR analysis to explore the associations of ADHD, ASD and TD with hyperthyroidism and hypothyroidism. MR analysis explores the associations between exposure and outcome using Mendelian randomization framework, and is based on extensive genomic data sets. Results Our results suggested that hypothyroidism was associated with TD, while no individual genetic variant was associated with hypothyroidism, ADHD, or ASD. Additionally, we found no reliable evidence that ADHD, ASD, or TD were causally linked to hyperthyroidism. There was also no credible evidence that any individual genetic variant was associated with an increased risk of hyperthyroidism. Our findings remained robust in sensitivity analyses. Conclusion Our study provides new insights into the relationship between NDDs and thyroid dysfunction. It suggests that there were potential risk factors and causal pathways, and c", "resource": "", "tier": "FYI", "matched": [{"kw": "mendelian randomization", "src": "core:statistical genetics"}, {"kw": "autism", "src": "core:disease genetics"}, {"kw": "asd", "src": "core:disease genetics"}, {"kw": "autism spectrum disorder", "src": "pool:From digest (user-added)"}], "suggest": ["ADHD", "thyroid function", "IVW"], "authors": "Li XAA, Li Z, Chen X, Bai H, Pan P, Zhou J, Wang J, Ding Z.", "year": "2026", "hi": false, "nm": false}, {"id": "10.3390/genes17070813", "doi": "10.3390/genes17070813", "title": "Multilayer Genomic Characterization of a Shared Genetic Factor Linking Depression-Related Liability and Reduced Physical Function", "venue": "Genes", "date": "2026-07-16", "url": "https://doi.org/10.3390/genes17070813", "score": 6, "project": "ASD long-read", "why": "Genomic SEM shared genetic factor linking depression liability and physical function (LDSC + factor GWAS + FUMA).", "abstract": "Background: Depression-related liability is frequently accompanied by reduced physical function, yet the shared genetic architecture linking mood-related traits and physical-function decline remains incompletely characterized. Methods: We applied genomic structural equation modeling to European-ancestry GWAS summary statistics for five constituent phenotypes: depressive symptoms, depression diagnosis, grip strength, appendicular lean mass, and walking pace. A Depression–Physical Function shared genetic factor was constructed as a cross-trait genetic covariance dimension and evaluated using LDSC-based validation and leave-one-trait-out sensitivity analyses. We then performed factor GWAS, FUMA locus annotation, Bayesian fine-mapping, MAGMA gene-based analysis, transcriptome-wide association analysis, pathway enrichment, CELLECT/MAGMA cell-type specificity analysis, partitioned heritability analysis, and gsMap spatial transcriptomic mapping. Results: The shared factor showed good model fit and retained 755,397 quality-controlled variants for downstream analysis. The factor was positively genetically correlated with depression-related traits and negatively correlated with physical-function-related traits. FUMA identified 245 genome-wide significant SNPs, 44 lead SNPs, and 38 genomic risk loci, with 127 positional mapped genes. Fine-mapping prioritized one high-confidence locus. MAG", "resource": "", "tier": "FYI", "matched": [{"kw": "gwas", "src": "core:statistical genetics"}, {"kw": "heritability", "src": "core:statistical genetics"}, {"kw": "ldsc", "src": "core:statistical genetics"}, {"kw": "fine-mapping", "src": "core:statistical genetics"}, {"kw": "twas", "src": "core:statistical genetics"}, {"kw": "transcriptome-wide", "src": "core:statistical genetics"}, {"kw": "spatial transcriptomic", "src": "core:single-cell/spatial"}], "suggest": ["genomic structural equation modeling", "depression", "factor GWAS", "FUMA"], "authors": "", "year": "2026", "hi": false, "nm": false}, {"id": "10.1186/s12872-026-06297-4", "doi": "10.1186/s12872-026-06297-4", "title": "Decoding the shared genetic architecture of atherosclerotic cardiovascular disease: a genomic structural equation modeling analysis.", "venue": "BMC Cardiovascular Disorders", "date": "2026-07-15", "url": "https://doi.org/10.1186/s12872-026-06297-4", "score": 6, "project": "statistical genetics", "why": "Genomic SEM shared architecture across ASCVD traits with TWAS(FOCUS)/fine-mapping/PRS.", "abstract": "BackgroundAtherosclerotic cardiovascular disease (ASCVD) represents a broad spectrum of phenotypes with shared pathology. However, the joint genetic architecture across different vascular beds remains incompletely characterized.MethodsWe applied genomic structural equation modeling (Genomic SEM) to integrate GWAS summary statistics from six ASCVD-related traits: coronary artery disease, myocardial infarction, ischemic stroke, peripheral artery disease, carotid intima-media thickness, and intracranial aneurysm. Downstream analyses included multivariate GWAS, fine-mapping, TWAS with FOCUS, MAGMA, pathway enrichment, cell-type and functional annotation, gsMAP and polygenic risk score.ResultsA single latent common factor model demonstrated an excellent fit to the genetic covariance matrix (CFI = 0.9837, SRMR = 0.1448). The multivariate GWAS identified 839 genome-wide significant SNPs, delineating 85 independent lead loci, of which 67 were novel. Integration of TWAS and FOCUS prioritized 6 high-confidence putative effector genes, including CDKN2B, MIA3, and NBEAL1. Functional enrichment highlighted lipid remodeling and apolipoprotein binding as predominant pathways. Notably, heritability was significantly localized in endothelial cell lineages across multiple tissues. Spatial mapping further identified the lung and kidney as key developmental tissue contexts for ASCVD genetic risk.C", "resource": "", "tier": "FYI", "matched": [{"kw": "gwas", "src": "core:statistical genetics"}, {"kw": "heritability", "src": "core:statistical genetics"}, {"kw": "fine-mapping", "src": "core:statistical genetics"}, {"kw": "polygenic", "src": "core:statistical genetics"}, {"kw": "twas", "src": "core:statistical genetics"}], "suggest": ["genomic structural equation modeling", "FOCUS", "polygenic risk"], "authors": "Zhong D, Ye Y, Ye T, Jin S.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1016/j.jad.2026.122163", "doi": "10.1016/j.jad.2026.122163", "title": "Clinical and genetic association of comorbid provisional PMDD and ADHD in female patients with bipolar disorder.", "venue": "Journal of Affective Disorders", "date": "2026-06-23", "url": "https://doi.org/10.1016/j.jad.2026.122163", "score": 6, "project": "ASD long-read", "why": "Polygenic-risk/clinical association of PMDD+ADHD in bipolar disorder.", "abstract": "BackgroundPremenstrual dysphoric disorder (PMDD) is a common comorbidity in bipolar disorder (BD), and its association with severe illness course and other comorbidity in BD has been reported.Aims & objectivesThis study aims to investigate clinical characteristics and polygenic risk features of the subgroup with DSM-5-based provisional PMDD in BD. Attention deficit/hyperactivity disorder (ADHD) symptoms and polygenic risk of ADHD were included in the analysis based on recent evidence suggesting the clinical and polygenic association between PMDD and ADHD in non-bipolar populations.MethodsFemale patients with BD were grouped into 'with PMDD' and 'without PMDD.' Clinical characteristics, including other comorbidities, and polygenic risk score (PRS) of major psychiatric disorders were compared between the two groups.ResultsOf the 423 participants, 187 (44.2%) met the DSM-5 criteria for provisional PMDD. Those with PMDD were more likely to have bipolar II disorder, had earlier illness onset, and experienced more frequent major depressive episodes. The prevalence of comorbid bulimia nervosa and ADHD symptom scores was higher in the PMDD group, compared to those without PMDD. In the analysis of genetic correlation using PRS for 5 major psychiatric disorders, the polygenic risk of ADHD was significantly associated with the severity of both PMDD symptom severity and ADHD symptoms.Discu", "resource": "", "tier": "FYI", "matched": [{"kw": "genetic correlation", "src": "core:statistical genetics"}, {"kw": "polygenic", "src": "core:statistical genetics"}, {"kw": "prs", "src": "core:statistical genetics"}], "suggest": ["polygenic risk score", "bipolar disorder", "ADHD", "PMDD", "psychiatric comorbidity"], "authors": "Baek JH, Choi MJ, Shin Y, Cho EY, Choi Y, Lee H, Myung W, Ha TH, Ahn YM, Ha K, Hong KS.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1530/erc-25-0405", "doi": "10.1530/erc-25-0405", "title": "Protective TGFβ2/SMAD3 Axis Identified by TWAS in Papillary Thyroid Cancer.", "venue": "Endocrine-Related Cancer", "date": "2026-07-15", "url": "https://doi.org/10.1530/erc-25-0405", "score": 6, "project": "", "why": "Integrated TWAS + SMR + coloc + HEIDI pipeline (your toolkit), applied to thyroid cancer.", "abstract": "Papillary thyroid carcinoma (PTC) is the most common endocrine malignancy. Although generally indolent, a subset shows aggressive behaviour. And the genetic heterogeneity of PTC is not fully explained by known driver mutations, underscoring the need to identify additional susceptibility genes and regulatory mechanisms. To identify additional susceptibility genes and regulatory mechanisms, we integrated transcriptome-wide association studies (TWAS) with summary-data-based Mendelian randomization (SMR), joint/conditional testing (JCT), and colocalisation analyses across multiple independent cohorts, followed by heterogeneity assessment using the in dependent instruments (HEIDI) test. Gene prioritisation analyses consistently highlighted TGFB2 and SMAD3 as candidate susceptibility genes for PTC, with SMR supporting putative protective effects. Besides, GEPIA analysis confirmed the positive correlation between TGFB2 and SMAD3 expression in TCGA-THCA. Functional experiments in TPC-1 cells showed that TGFβ2 treatment inhibited cell proliferation and migration, induced apoptosis, and resulted in G0/G1 cell-cycle arrest, accompanied by increased SMAD3 phosphorylation, suggesting activation of canonical TGFβ signalling. Collectively, these findings bridge population-based genetic inference with mechanistic validation and suggest convergent evidence supporting a tumour-suppressive role o", "resource": "", "tier": "FYI", "matched": [{"kw": "coloc", "src": "core:statistical genetics"}, {"kw": "mendelian randomization", "src": "core:statistical genetics"}, {"kw": "twas", "src": "core:statistical genetics"}, {"kw": "transcriptome-wide", "src": "core:statistical genetics"}], "suggest": ["SMR", "HEIDI"], "authors": "Zhang Q, Tang J, Yang J, Li Y, Li X, Wang K, Zhang P, Wang K, Zha B.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1186/s12915-026-02676-7", "doi": "10.1186/s12915-026-02676-7", "title": "ViMST: vision transformer-based dual modality multi-task graph contrastive network for spatial transcriptomics microenvironments investigation.", "venue": "BMC Biology", "date": "2026-07-15", "url": "https://doi.org/10.1186/s12915-026-02676-7", "score": 6, "project": "Single-cell/spatial", "why": "ViMST vision-transformer graph-contrastive method for spatial-transcriptomics microenvironments (released tool).", "abstract": "BackgroundInvestigating spatial transcriptomics microenvironments is crucial for unraveling cellular heterogeneity. Existing methods struggle to extract non-redundant information from histopathological images, as well as to simultaneously and spatially resolve gene expression profiles. We propose a vision transformer-based dual-modality multi-task graph contrastive network for exploring the spatial transcriptomics domain (ViMST), which integrates gene expression, image features, and spatial coordinates to investigate tissue microenvironments. It employs Vision Transformer (ViT) for feature extraction and dual masked Graph Convolutional Networks (GCNs) to model modalities separately. A novel joint topology decoder learns the spatial covariation between morphology and expression, thereby enhancing relationship modeling across multiple tasks.ResultsThe evaluation results across nine spatial transcriptomics datasets reveal that ViMST consistently outperforms eight state-of-the-art methods in spatial domain identification and data denoising. It demonstrates robust performance in multiple tissue microenvironment research tasks, including data visualization, trajectory inference, identification of spatially variable genes (SVGs), horizontal integration analysis, cellular heterogeneity analysis, and epithelial-mesenchymal transition (EMT) studies.ConclusionsViMST is a powerful and vers", "resource": "ViMST spatial-transcriptomics tool", "tier": "FYI", "matched": [{"kw": "spatial transcriptomic", "src": "core:single-cell/spatial"}], "suggest": ["spatial transcriptomics", "vision transformer", "graph contrastive learning", "tissue microenvironment"], "authors": "Ding C, Liu Q, Zhao Y.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1016/j.ajhg.2026.06.014", "doi": "10.1016/j.ajhg.2026.06.014", "title": "Additive value of polygenic risk and family history for coronary heart disease risk stratification in two diverse US cohorts.", "venue": "The American Journal of Human Genetics", "date": "2026-07-14", "url": "https://doi.org/10.1016/j.ajhg.2026.06.014", "score": 6, "project": "statistical genetics", "why": "AJHG: PRS + monogenic FH + family-history additivity for CHD across ancestries in eMERGE and All of Us.", "abstract": "Whether polygenic risk, monogenic familial hypercholesterolemia (FH), and family history (FamHx) are additively informative for coronary heart disease (CHD) risk prediction across self-identified race/ethnicity (SIRE) groups has not been established. In two diverse cohorts-Electronic Medical Records and Genomics (eMERGE) phase IV (eIV; n = 19,348) and All of Us (AoU; n = 239,645)-we quantified the associations of a polygenic risk score (PRSCHD), pathogenic/likely pathogenic variants in genes associated with FH, and FamHx with CHD and evaluated their incremental value when added to the pooled cohort equations (PCEs). CHD was defined as myocardial infarction, unstable angina, or coronary revascularization. We modeled associations with multivariable logistic regression (prevalent CHD in eIV) and Cox proportional hazards (incident CHD in AoU) and characterized predictive performance with the c-statistic and reclassification and decision-curve net benefits across actionable 10-year risk thresholds. The effects of PRSCHD and FamHx were independent and additive in both cohorts and consistent across White, Black, and Latino SIRE groups. In eIV, adding PRSCHD and FamHx to the PCE increased the c-statistic for prevalent CHD from 0.719 to 0.753 (p-diff = 9.1 × 10-3) and reclassified 18.8% of participants at the 7.5% 10-year threshold, yielding approximately 4 additional true-positive CHD ", "resource": "", "tier": "FYI", "matched": [{"kw": "polygenic", "src": "core:statistical genetics"}, {"kw": "prs", "src": "core:statistical genetics"}], "suggest": ["polygenic risk score", "coronary heart disease", "family history", "All of Us", "risk stratification"], "authors": "Naderian M, Smith JL, Dikilitas O, Hamed ME, Abul-Husn NS, Connolly JJ, Cortopassi JB, Feng Q, Hanks SC, Irvin R, Jarvik GP, Kenny EE, Khan A, Kottyan LC, Limdi NA, McNally EM, Miller E, Namjou-Khales B, Roy-Puckelwartz M, Rowley R, Tiwari HK, Wei WQ, Wiesner G, Manolio TA, Sharp RR, Kullo IJ.", "year": "2026", "hi": true, "nm": false}, {"id": "10.64898/2026.07.13.26358006", "doi": "10.64898/2026.07.13.26358006", "title": "Characterizing the impact of plasma protein levels on human brain structure and disorders leveraging integrative multi-omics analysis", "venue": "medRxiv", "date": "2026-07-15", "url": "https://doi.org/10.64898/2026.07.13.26358006", "score": 6, "project": "PWAS / ASD long-read", "why": "PWAS/pQTL integrating plasma proteome with brain imaging and psychiatric disorders.", "abstract": "With recent advances in high-throughput proteomic technologies, population-scale plasma proteomics datasets, often linked to extensive genetic and phenotypic information, have become increasingly accessible. Yet the relationships between circulating protein levels, brain imaging phenotypes, and risk for neurological and psychiatric disorders remain largely unexplored. Proteome-wide association studies offer a promising approach for elucidating biological mechanisms that connect genetic variation to complex brain-related traits and diseases. In this study, we integrated protein quantitative trait loci (pQTLs) from the two largest plasma proteomic resources (the UK Biobank Pharma Proteomics Project [UKB-PPP] and Ferkingstad et al. [deCODE]) with genome-wide association studies of brain imaging-derived phenotypes in UK Biobank using Mendelian randomization and colocalization analyses. We identified 120 cis and 20 trans associations between plasma proteins and imaging phenotypes and validated these findings using brain tissue-derived proteomic and transcriptomic datasets. Multivariable Mendelian randomization revealed eleven plasma proteins (coding genes APOE, ARL3, MICB, NSF, RHOC, RSPO3, ENPP2, BTN2A1, EIF2AK3, MRVI1, and OPLAH) with significant direct effects on the risk of Alzheimers disease, Parkinsons disease, multiple sclerosis, bipolar disorder, and schizophrenia. Single-ce", "resource": "", "tier": "FYI", "matched": [{"kw": "genome-wide association", "src": "core:statistical genetics"}, {"kw": "colocalization", "src": "core:statistical genetics"}, {"kw": "coloc", "src": "core:statistical genetics"}, {"kw": "mendelian randomization", "src": "core:statistical genetics"}, {"kw": "proteome-wide association", "src": "core:statistical genetics"}, {"kw": "single-cell", "src": "core:single-cell/spatial"}, {"kw": "aging", "src": "core:aging/cell-death"}], "suggest": ["pQTL", "UK Biobank PPP", "brain imaging phenotypes", "psychiatric disorders"], "authors": "Ayubcha, C.; Dennis, E.; Bhattacharyya, U.; John, J.; Lam, M.; Lencz, T.; Ge, T.; Chen, C.-Y.", "year": "2026", "hi": false, "nm": false}, {"id": "10.1038/s41398-026-04155-7", "doi": "10.1038/s41398-026-04155-7", "title": "Investigation
